name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            asset_name: Front_Porch_AI_Windows.zip
            build_path: build/windows/x64/runner/Release
          - os: macos-latest
            platform: macos
            asset_name: Front_Porch_AI_MacOS.zip
            build_path: build/macos/Build/Products/Release
          - os: ubuntu-22.04
            platform: linux
            asset_name: Front_Porch_AI_Linux.tar.gz
            build_path: build/linux/x64/release/bundle

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev libsecret-1-dev libwebkit2gtk-4.1-dev ninja-build pkg-config cmake

      - name: Sync Version from Tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION=$(echo "$TAG" | sed 's/^[vV]//')
          # Convert 4-part (0.0.4.1) to Flutter format (0.0.4+1)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.([0-9]+)$ ]]; then
            FLUTTER_VERSION="$(echo $VERSION | sed 's/\.\([^.]*\)$/+\1/')"
          else
            FLUTTER_VERSION="${VERSION}+0"
          fi
          echo "Setting version to: $FLUTTER_VERSION"
          sed "s/^version: .*/version: $FLUTTER_VERSION/" pubspec.yaml > pubspec.tmp && mv pubspec.tmp pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Remove inappwebview Linux plugin (uses external browser fallback)
        if: matrix.platform == 'linux'
        run: |
          # Remove the plugin symlink
          rm -rf linux/flutter/ephemeral/.plugin_symlinks/flutter_inappwebview_linux
          # Remove from generated CMake plugin list
          sed -i '/flutter_inappwebview_linux/d' linux/flutter/generated_plugins.cmake
          # Remove from generated plugin registrant
          sed -i '/flutter_inappwebview_linux/d' linux/flutter/generated_plugin_registrant.cc
          sed -i '/flutter_inappwebview_linux/d' linux/flutter/generated_plugin_registrant.h

      - name: Build Application
        run: flutter build ${{ matrix.platform }} --release

      - name: Package Windows
        if: matrix.platform == 'windows'
        run: |
          cd ${{ matrix.build_path }}
          Compress-Archive -Path * -DestinationPath ../../../../../${{ matrix.asset_name }}
        shell: pwsh

      - name: Package MacOS
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          echo "Found app bundle: $APP_NAME"
          zip -r ../../../../../${{ matrix.asset_name }} "$APP_NAME"

      - name: Get Version
        id: get_version
        if: matrix.platform == 'linux'
        run: echo "VERSION=$(echo ${GITHUB_REF_NAME} | sed 's/^[vV]//')" >> $GITHUB_OUTPUT

      - name: Package Linux
        if: matrix.platform == 'linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building packages for version $VERSION"
          
          # 1. Prepare AppImage
          # AppImage standard: AppRun at root, resources in distinct folders
          mkdir -p AppDir/usr/bin
          cp -r ${{ matrix.build_path }}/* AppDir/usr/bin/
          
          # Create Desktop file
          cat <<EOF > AppDir/front_porch_ai.desktop
          [Desktop Entry]
          Name=Front Porch AI
          Exec=front_porch_ai
          Icon=front_porch_ai
          Type=Application
          Categories=Utility;
          EOF
          
          # Icon management
          if [ -f "assets/images/front_porch_ai_icon.png" ]; then
            cp assets/images/front_porch_ai_icon.png AppDir/front_porch_ai.png
            cp assets/images/front_porch_ai_icon.png AppDir/.DirIcon
          else
            touch AppDir/front_porch_ai.png
            touch AppDir/.DirIcon
          fi
          
          # AppRun - symlink to the binary in usr/bin
          ln -s usr/bin/front_porch_ai AppDir/AppRun
          
          # Create AppImage
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          ./appimagetool AppDir Front_Porch_AI-Linux.AppImage
          
          # 2. Prepare .deb
          # Install to /opt to keep bundle together
          mkdir -p deb/opt/front-porch-ai
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/DEBIAN
          
          cp -r ${{ matrix.build_path }}/* deb/opt/front-porch-ai/
          # Symlink to /usr/bin
          ln -s /opt/front-porch-ai/front_porch_ai deb/usr/bin/front-porch-ai
          
          # Copy desktop file and icon
          cp AppDir/front_porch_ai.desktop deb/usr/share/applications/
          mkdir -p deb/usr/share/pixmaps
          cp AppDir/front_porch_ai.png deb/usr/share/pixmaps/
          
          cat <<EOF > deb/DEBIAN/control
          Package: front-porch-ai
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Front Porch AI Team
          Description: A chilled out frontend for KoboldCPP.
          EOF
          dpkg-deb --build deb Front_Porch_AI-Linux.deb
          
          # 3. Prepare .rpm
          sudo apt-get install -y rpm
          mkdir -p rpmroot/{BUILD,RPMS,SOURCES,SPECS,SRPMS,INSTALL}
          
          cat <<EOF > rpmroot/SPECS/front-porch-ai.spec
          Name:           front-porch-ai
          Version:        $VERSION
          Release:        1%{?dist}
          Summary:        Front Porch AI Frontend
          License:        MIT
          URL:            https://github.com/linux4life1/front-porch-AI
          
          %description
          A chilled out frontend for KoboldCPP.
          
          %install
          mkdir -p %{buildroot}/opt/front-porch-ai
          mkdir -p %{buildroot}/usr/bin
          cp -r ${{ matrix.build_path }}/* %{buildroot}/opt/front-porch-ai/
          ln -s /opt/front-porch-ai/front_porch_ai %{buildroot}/usr/bin/front-porch-ai
          
          %files
          /opt/front-porch-ai
          /usr/bin/front-porch-ai
          
          %changelog
          EOF
          
          rpmbuild --define "_topdir $(pwd)/rpmroot" --define "_buildrootdir $(pwd)/rpmroot/INSTALL" -bb rpmroot/SPECS/front-porch-ai.spec
          cp rpmroot/RPMS/x86_64/*.rpm Front_Porch_AI-Linux.rpm
          
          # 4. Standard tar.gz
          cd ${{ matrix.build_path }}
          tar -czvf ../../../../../${{ matrix.asset_name }} .

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            Front_Porch_AI-Linux.AppImage
            Front_Porch_AI-Linux.deb
            Front_Porch_AI-Linux.rpm
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
