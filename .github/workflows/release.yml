name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets for macOS Notarization (same as nightly.yml)
#
#   MACOS_CERTIFICATE, MACOS_CERTIFICATE_PWD, MACOS_CERTIFICATE_NAME,
#   APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID
#
# Security notes:
# - We use `::add-mask::` to proactively mask MACOS_CERTIFICATE_NAME and APPLE_TEAM_ID
#   in all logs for the macOS job.
# - See nightly.yml for the full list and explanation.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  release:
    name: Build and Release
    if: ${{ !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'dev') }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build_path: build/windows/x64/runner/Release
          - os: macos-latest
            platform: macos
            build_path: build/macos/Build/Products/Release
          - os: ubuntu-22.04
            platform: linux
            asset_name: Front_Porch_AI_Linux.tar.gz
            build_path: build/linux/x64/release/bundle

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev libsecret-1-dev libwebkit2gtk-4.1-dev ninja-build pkg-config cmake libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Sync Version from Tag
        shell: bash
        run: |
          # This step converts the Git tag (e.g. v0.9.8.0.1) into proper version strings
          # for both pubspec.yaml and the in-app version constant.
          # See detailed explanation in the bash logic below.
          TAG="${GITHUB_REF_NAME}"
          VERSION=$(echo "$TAG" | sed 's/^[vV]//')

          # === Version Normalization for Flutter ===
          # This project deliberately uses "deep" versioning (e.g. 0.9.8.0.1, 0.9.8.1.1)
          # so the maintainer can do many tiny patches under 0.9.8 without burning
          # through 0.9.8.1 → 0.9.8.9.
          #
          # For pubspec.yaml (FLUTTER_VERSION), we must produce a valid Flutter version.
          # Flutter expects at most 3 numeric segments before the "+" build number.
          #
          # Rule:
          #   - Use the first 3 segments as the base version (0.9.8)
          #   - Use the LAST segment from the tag as the build number
          #
          # Examples:
          #   0.9.8       → 0.9.8+0
          #   0.9.8.1     → 0.9.8+1
          #   0.9.8.0.1   → 0.9.8+1
          #   0.9.8.1.1   → 0.9.8+1
          #
          # DISPLAY_VERSION keeps the original full string (e.g. "0.9.8.0.1")
          # so it shows correctly inside the app.
          #
          # FLUTTER_VERSION is only for pubspec.yaml compatibility.
          IFS='.' read -ra PARTS <<< "$VERSION"
          COUNT=${#PARTS[@]}

          if [ "$COUNT" -gt 1 ]; then
              # Always use first 3 parts as base (or fewer if the version is short)
              BASE_PARTS=("${PARTS[@]:0:3}")
              BASE=$(IFS='.'; echo "${BASE_PARTS[*]}")
              BUILD=${PARTS[$((COUNT-1))]}
              FLUTTER_VERSION="${BASE}+${BUILD}"
          else
              FLUTTER_VERSION="${VERSION}+0"
          fi

          echo "Setting version to: $FLUTTER_VERSION"

          # DISPLAY_VERSION keeps the original tag (e.g. "0.9.8.0.1") so it shows
          # correctly in the app's About/Settings screen and update dialogs.
          DISPLAY_VERSION="$VERSION"
          export FLUTTER_VERSION
          export DISPLAY_VERSION

          # Use Python for cross-platform reliability (sed can fail silently with Windows \r\n line endings)
          # Use heredoc with single quotes to avoid shell quote/expansion hell inside -c
          python3 - << 'PYEOF'
          import re
          import os

          fv = os.environ['FLUTTER_VERSION']
          dv = os.environ['DISPLAY_VERSION']

          # Update pubspec.yaml
          with open('pubspec.yaml', 'r') as f:
              content = f.read()
          content = re.sub(r'^version: .*$', f'version: {fv}', content, flags=re.MULTILINE)
          with open('pubspec.yaml', 'w') as f:
              f.write(content)

          # Patch only the appVersion constant (preserve all committed getters and comments).
          # This eliminates duplication and prevents compile breaks when app_version.dart evolves.
          with open('lib/app_version.dart', 'r') as f:
              content = f.read()
          content = re.sub(r"^const String appVersion = '.*';$", f"const String appVersion = '{dv}';", content, flags=re.MULTILINE)
          with open('lib/app_version.dart', 'w') as f:
              f.write(content)
          PYEOF
          # Verify both were updated (visible in CI logs)
          echo "Verifying pubspec version:"
          grep '^version:' pubspec.yaml
          echo "Verifying Dart version constant:"
          cat lib/app_version.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Disable inappwebview Linux plugin (uses external browser fallback)
        if: matrix.platform == 'linux'
        run: |
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  flutter_inappwebview_linux:" >> pubspec.yaml
          echo "    path: ci/flutter_inappwebview_linux_stub" >> pubspec.yaml
          flutter pub get

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts (embed_server + ort prebuilts)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "tools/embed_server"

      - name: Setup Python (with pip cache)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Build Application
        run: flutter build ${{ matrix.platform }} --release

      - name: Bundle ML Engines (Kokoro TTS, Piper TTS, Whisper STT, ONNX Embeddings)
        shell: bash
        run: |
          echo "Building ML engines from source"
          DEST="${{ matrix.build_path }}/piper"
          mkdir -p "$DEST"

          # Install TTS dependencies + PyInstaller
            pip install --upgrade pip
            pip install pyinstaller kokoro-onnx soundfile piper_tts pathvalidate faster-whisper numpy onnxruntime transformers huggingface_hub

            # Build Kokoro TTS as a standalone directory bundle
            echo "Building Kokoro TTS binary..."
            pyinstaller kokoro_tts.py \
              --onedir \
              --name kokoro_tts \
              --collect-all kokoro_onnx \
              --collect-all soundfile \
              --collect-all language_tags \
              --collect-all csvw \
              --collect-all segments \
              --collect-all phonemizer \
              --collect-all espeakng_loader \
              --hidden-import kokoro_onnx \
              --hidden-import soundfile \
              --hidden-import numpy \
              --hidden-import onnxruntime \
              --distpath "$DEST" \
              --workpath ./build_tmp/kokoro \
              --specpath ./build_tmp/kokoro \
              --clean \
              --exclude-module torch \
              --exclude-module torchvision \
              --exclude-module torchaudio \
              --noconfirm
            echo "Kokoro built at: $DEST/kokoro_tts/"

            # Build Piper TTS as a standalone directory bundle
            echo "Building Piper TTS binary..."
            pyinstaller piper_entry.py \
              --onedir \
              --name piper \
              --collect-all piper \
              --hidden-import piper \
              --hidden-import pathvalidate \
              --hidden-import piper_phonemize \
              --hidden-import onnxruntime \
              --distpath "$DEST" \
              --workpath ./build_tmp/piper \
              --specpath ./build_tmp/piper \
              --clean \
              --exclude-module torch \
              --exclude-module torchvision \
              --exclude-module torchaudio \
              --noconfirm
            echo "Piper built at: $DEST/piper/"

            # Build Whisper STT as a standalone directory bundle
            echo "Building Whisper STT binary..."
            STT_DEST="${{ matrix.build_path }}"
            pyinstaller whisper_stt.py \
              --onedir \
              --name whisper_stt \
              --collect-all faster_whisper \
              --hidden-import faster_whisper \
              --hidden-import ctranslate2 \
              --hidden-import huggingface_hub \
              --hidden-import tokenizers \
              --distpath "$STT_DEST" \
              --workpath ./build_tmp/whisper \
              --specpath ./build_tmp/whisper \
              --clean \
              --exclude-module torch \
              --exclude-module torchvision \
              --exclude-module torchaudio \
              --noconfirm
            echo "Whisper STT built at: $STT_DEST/whisper_stt/"

            # Build Embedding Server (Rust binary)
            # NOTE: ort-sys downloads static ONNX from parcel.pyke.io (can be flaky on Windows).
            # rust-cache + retries protect release builds.
            echo "Building Embedding Server (Rust)..."
            cd tools/embed_server
            for attempt in 1 2 3; do
              if cargo build --release; then
                echo "cargo build succeeded on attempt $attempt"
                break
              else
                echo "cargo build attempt $attempt failed"
                if [ $attempt -lt 3 ]; then
                  echo "Retrying in 15s..."
                  sleep 15
                else
                  echo "ERROR: cargo build failed after 3 attempts"
                  exit 1
                fi
              fi
            done
            cd ../.. 
            EMBED_BINARY="tools/embed_server/target/release/embed_server"
            if [ "${{ matrix.platform }}" = "windows" ]; then
              EMBED_BINARY="tools/embed_server/target/release/embed_server.exe"
            fi
            mkdir -p "$STT_DEST/embed_server"
            cp "$EMBED_BINARY" "$STT_DEST/embed_server/"
            echo "Embedding server built at: $STT_DEST/embed_server/"

            # Build Sentiment Classifier (expression images ONNX)
            echo "Building Sentiment Classifier binary..."
            pyinstaller sentiment_classifier.py \
              --onedir \
              --name sentiment_classifier \
              --collect-all huggingface_hub \
              --collect-all transformers \
              --collect-all numpy \
              --collect-all onnxruntime \
              --hidden-import huggingface_hub \
              --hidden-import transformers \
              --hidden-import numpy \
              --hidden-import onnxruntime \
              --distpath "$STT_DEST" \
              --workpath ./build_tmp/sentiment \
              --specpath ./build_tmp/sentiment \
              --clean \
              --exclude-module torch \
              --exclude-module torchvision \
              --exclude-module torchaudio \
              --noconfirm
            echo "Sentiment classifier built at: $STT_DEST/sentiment_classifier/"

            # Build Draw Things gRPC client (for local Draw Things backend image gen)
            # --add-data includes the sibling .py source files (client.py, pb2 files, etc.)
            # that dt_grpc_client.py imports via sys.path.insert(0, dirname(__file__)).
            # Without --add-data these files are absent inside the frozen bundle, causing
            # ImportError in .app builds (while flutter run works because the raw .py files
            # are on disk and sys.path.insert finds them).
            # --paths tells PyInstaller to trace imports from the sibling directory at
            # bundle time, so hidden-import client / imageService_pb2 are actually found.
            echo "Building Draw Things gRPC client..."
            # Use $(pwd) absolute paths for --add-data: when --specpath is set,
            # PyInstaller resolves relative paths relative to the spec file location
            # (./build_tmp/dt_grpc/), not the workspace root. Absolute paths are
            # unambiguous regardless of where the spec file lives.
            GRPC_SRC="$(pwd)/tools/dt-grpc-python"
            pyinstaller "$GRPC_SRC/dt_grpc_client.py" \
              --onedir \
              --name dt_grpc_client \
              --paths "$GRPC_SRC" \
              --add-data "$GRPC_SRC/client.py:." \
              --add-data "$GRPC_SRC/imageService_pb2.py:." \
              --add-data "$GRPC_SRC/imageService_pb2_grpc.py:." \
              --add-data "$GRPC_SRC/GenerationConfiguration.py:." \
              --add-data "$GRPC_SRC/SamplerType.py:." \
              --add-data "$GRPC_SRC/SeedMode.py:." \
              --add-data "$GRPC_SRC/LoRA.py:." \
              --add-data "$GRPC_SRC/LoRAMode.py:." \
              --add-data "$GRPC_SRC/Control.py:." \
              --add-data "$GRPC_SRC/ControlInputType.py:." \
              --add-data "$GRPC_SRC/ControlMode.py:." \
              --add-data "$GRPC_SRC/ca_chain.pem:." \
              --collect-all grpcio \
              --collect-all flatbuffers \
              --collect-all fpzip \
              --collect-all numpy \
              --collect-all PIL \
              --hidden-import grpc \
              --hidden-import grpc._cython \
              --hidden-import grpcio \
              --hidden-import flatbuffers \
              --hidden-import fpzip \
              --hidden-import numpy \
              --hidden-import PIL \
              --hidden-import PIL.Image \
              --hidden-import imageService_pb2 \
              --hidden-import imageService_pb2_grpc \
              --hidden-import GenerationConfiguration \
              --hidden-import SamplerType \
              --hidden-import SeedMode \
              --hidden-import LoRA \
              --hidden-import LoRAMode \
              --hidden-import client \
              --distpath "$STT_DEST" \
              --workpath ./build_tmp/dt_grpc \
              --specpath ./build_tmp/dt_grpc \
              --clean \
              --exclude-module torch \
              --exclude-module torchvision \
              --exclude-module torchaudio \
              --noconfirm
            echo "Draw Things gRPC client built at: $STT_DEST/dt_grpc_client/"

          # For macOS, copy into the app bundle Resources (always runs)
          if [ "${{ matrix.platform }}" = "macos" ]; then
            APP_NAME=$(ls -d ${{ matrix.build_path }}/*.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              RESOURCES="$APP_NAME/Contents/Resources/piper"
              mkdir -p "$RESOURCES"
              cp -R "${{ matrix.build_path }}/piper/kokoro_tts" "$RESOURCES/kokoro_tts" 2>/dev/null || true
              cp -R "${{ matrix.build_path }}/piper/piper" "$RESOURCES/piper" 2>/dev/null || true
              chmod +x "$RESOURCES/kokoro_tts/kokoro_tts" 2>/dev/null || true
              chmod +x "$RESOURCES/piper/piper" 2>/dev/null || true

              STT_RESOURCES="$APP_NAME/Contents/Resources/whisper_stt"
              mkdir -p "$STT_RESOURCES"
              cp -R "${{ matrix.build_path }}/whisper_stt/"* "$STT_RESOURCES/" 2>/dev/null || true
              chmod +x "$STT_RESOURCES/whisper_stt" 2>/dev/null || true

              EMBED_RESOURCES="$APP_NAME/Contents/Resources/embed_server"
              mkdir -p "$EMBED_RESOURCES"
              cp -R "${{ matrix.build_path }}/embed_server/"* "$EMBED_RESOURCES/" 2>/dev/null || true
              chmod +x "$EMBED_RESOURCES/embed_server" 2>/dev/null || true

              SENTIMENT_RESOURCES="$APP_NAME/Contents/Resources/sentiment_classifier"
              mkdir -p "$SENTIMENT_RESOURCES"
              cp -R "${{ matrix.build_path }}/sentiment_classifier/"* "$SENTIMENT_RESOURCES/" 2>/dev/null || true
              chmod +x "$SENTIMENT_RESOURCES/sentiment_classifier" 2>/dev/null || true

              # Draw Things gRPC client
              DT_RESOURCES="$APP_NAME/Contents/Resources/dt_grpc"
              mkdir -p "$DT_RESOURCES"
              cp -R "${{ matrix.build_path }}/dt_grpc_client" "$DT_RESOURCES/" 2>/dev/null || true
              chmod +x "$DT_RESOURCES/dt_grpc_client/dt_grpc_client" 2>/dev/null || true
            fi
          fi

          echo "ML engine bundling step complete"

          echo "TTS engines bundled at: $DEST"
          ls -la "$DEST"
          echo "STT engine bundled at: $STT_DEST/whisper_stt/"
          ls -la "$STT_DEST/whisper_stt/"
          echo "Embedding server bundled at: $STT_DEST/embed_server/"
          ls -la "$STT_DEST/embed_server/"

      - name: Mask sensitive certificate values (prevent accidental log leakage)
        if: matrix.platform == 'macos'
        run: |
          # These values will be masked in all logs for this job, even if they
          # accidentally appear in command output, error messages, or env dumps.
          echo "::add-mask::${{ secrets.MACOS_CERTIFICATE_NAME }}"
          echo "::add-mask::${{ secrets.APPLE_TEAM_ID }}"

      - name: Import Apple Developer Certificate
        if: matrix.platform == 'macos'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Create a temporary keychain
          security create-keychain -p "" "$KEYCHAIN_PATH" 2>/dev/null || true
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          # Decode and import the .p12 certificate
          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign

          # Allow codesign to use the key without prompting
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

          # Make the temporary keychain the default for this job
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          echo "Certificate imported successfully"

      - name: Verify certificate is available
        if: matrix.platform == 'macos'
        env:
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          echo "Looking for certificate identity..."
          security find-identity -v -p codesigning

          if ! security find-identity -v -p codesigning | grep -q "$MACOS_CERTIFICATE_NAME"; then
            echo "ERROR: Certificate '$MACOS_CERTIFICATE_NAME' was not found in the keychain after import."
            echo "This usually means the certificate name/hash in the secret does not exactly match."
            exit 1
          fi

          echo "✓ Certificate identity found in keychain"

      - name: Clean xattrs from app bundle (before code signing)
        if: matrix.platform == 'macos'
        run: |
          APP_PATH=$(ls -d build/macos/Build/Products/Release/*.app 2>/dev/null | head -1)
          echo "Cleaning xattrs on $APP_PATH (must be before codesigning and notarization)"
          xattr -cr "$APP_PATH" || true
          find "$APP_PATH" -exec xattr -d com.apple.FinderInfo {} + 2>/dev/null || true

      - name: Code Sign macOS App (Developer ID)
        if: matrix.platform == 'macos'
        env:
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          APP_NAME=$(ls -d ${{ matrix.build_path }}/*.app | head -1)
          ENTITLEMENTS="${{ github.workspace }}/macos/Runner/Release.entitlements"
          # Sidecar entitlements: required for all PyInstaller bundles under hardened
          # runtime. PyInstaller's boot-loader needs:
          #   - cs.disable-library-validation   (load unsigned .so extension modules
          #                                      bundled inside _internal/)
          #   - cs.allow-unsigned-executable-memory (mmap the .pyc archive as exec)
          # Without these, macOS kills the sidecar immediately when the app runs.
          SIDECAR_ENT="${{ github.workspace }}/macos/Runner/Sidecar.entitlements"

          # Parallelize signing. The bundled ML sidecars (PyInstaller) contain
          # thousands of Mach-O files, and each codesign --timestamp call is a
          # network round-trip to Apple's timestamp server, so signing them one at
          # a time took ~18 min. Signing each pass concurrently collapses that to a
          # few minutes. Behavior is otherwise unchanged: passes still run
          # inside-out (one after another; the main .app is signed LAST), and only
          # distinct files WITHIN a pass run in parallel (no file is signed twice
          # at once). Exact codesign flags/entitlements/coverage are identical to
          # the previous sequential version. JOBS is network-bound, not CPU-bound;
          # lower it if Apple's timestamp server throttles. macOS ships BSD xargs,
          # so we avoid GNU-only flags (no -r) and guard against empty input.
          export MACOS_CERTIFICATE_NAME SIDECAR_ENT ENTITLEMENTS
          JOBS=8

          echo "Code signing $APP_NAME with hardened runtime using Developer ID certificate (parallel x$JOBS)..."

          # Pass 1 — frameworks and dylibs first (inside-out).
          find "$APP_NAME/Contents/Frameworks" \( -name "*.framework" -o -name "*.dylib" \) -print0 2>/dev/null \
            | xargs -0 -P "$JOBS" -I {} bash -c '
                f="$1"; [ -n "$f" ] || exit 0
                codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime "$f" \
                  2>&1 | grep -v -E "(replacing existing signature|already signed)" || true
              ' _ {} || true

          echo "    Signing loose Mach-O files under Resources (excluding *.framework internals)..."
          find "$APP_NAME/Contents/Resources" -type f ! -path '*.framework/*' -print0 2>/dev/null \
            | xargs -0 -P "$JOBS" -I {} bash -c '
                f="$1"; [ -n "$f" ] || exit 0
                if file "$f" | grep -q "Mach-O"; then
                  codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime \
                    --entitlements "$SIDECAR_ENT" "$f" \
                    2>&1 | grep -v -E "(replacing existing signature|already signed)" || true
                fi
              ' _ {} || true

          echo "    Normalizing + signing nested *.framework bundles (PyInstaller layout)..."
          # PyInstaller's frameworks are already versioned (Versions/<X.Y>/<name> is
          # the real Mach-O) but ALSO carry a DUPLICATE real binary (and Resources) at
          # the framework ROOT. A real Mach-O at the bundle root looks app-like while
          # Versions/ looks framework-like, so codesign reports "bundle format is
          # ambiguous (could be app or framework)" and cannot SEAL the framework —
          # which makes Apple's notary reject it with "The signature of the binary is
          # invalid." (The old best-effort `|| true` loop here silently tolerated
          # older clean caches but fails the moment a newer PyInstaller cache is used;
          # `pip install pyinstaller` is unpinned, so that can change at any rebuild.)
          # Fix: normalize each framework to the canonical layout (root entries become
          # symlinks into Versions/Current, dropping the duplicate root binary), then
          # SEAL it, with a hard local `codesign --verify --deep --strict` gate so we
          # never submit a framework Apple would reject.
          while IFS= read -r -d '' fw; do
            name="$(basename "$fw" .framework)"

            realver=""
            shopt -s nullglob
            for cand in "$fw"/Versions/*/; do
              cn="$(basename "$cand")"
              case "$cn" in Current) continue;; esac
              if [ -f "$cand$name" ] && [ ! -L "${cand}$name" ]; then realver="$cn"; break; fi
            done
            shopt -u nullglob

            if [ -n "$realver" ]; then
              if [ "$realver" != "A" ] && [ -d "$fw/Versions/A" ] && [ ! -f "$fw/Versions/A/$name" ]; then
                rm -rf "$fw/Versions/A"
              fi
              rm -rf "$fw/Versions/Current"
              ln -s "$realver" "$fw/Versions/Current"
              for sub in "$name" Resources Headers Modules; do
                if [ -e "$fw/Versions/$realver/$sub" ] && [ ! -L "$fw/$sub" ]; then
                  rm -rf "$fw/$sub"
                  ln -s "Versions/Current/$sub" "$fw/$sub"
                fi
              done
              echo "      ↻ normalized framework layout: $fw (version $realver)"
            fi

            tgtver="${realver:+$fw/Versions/$realver}"; tgtver="${tgtver:-$fw}"
            while IFS= read -r -d '' inner; do
              case "$inner" in */"$name") [ -n "$realver" ] && [ "$inner" = "$fw/Versions/$realver/$name" ] && continue;; esac
              file "$inner" | grep -q "Mach-O" || continue
              codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime "$inner" >/dev/null 2>&1 || true
            done < <(find "$tgtver" -type f -print0 2>/dev/null || true)

            i=0
            until codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime "$fw" >/tmp/cs_fw.log 2>&1; do
              i=$((i + 1)); if [ "$i" -ge 4 ]; then echo "::error::Failed to sign framework $fw"; cat /tmp/cs_fw.log; ls -laR "$fw" | head -120; exit 1; fi
              sleep $((i * 2))
            done

            if ! codesign --verify --deep --strict --verbose=2 "$fw" >/tmp/cs_vfy.log 2>&1; then
              echo "::error::codesign --verify failed for framework $fw"; cat /tmp/cs_vfy.log
              echo "---- framework structure ----"; ls -laR "$fw" | head -120
              exit 1
            fi
            echo "      ✓ framework signed + verified: $fw"
          done < <(find "$APP_NAME/Contents/Resources" -type d -name "*.framework" -print0 2>/dev/null || true)

          echo "    Broad catch-all pass: force-signing EVERY Mach-O under Resources..."
          find "$APP_NAME/Contents/Resources" -type f -print0 2>/dev/null \
            | xargs -0 -P "$JOBS" -I {} bash -c '
                f="$1"; [ -n "$f" ] || exit 0
                case "$f" in
                  */Contents/MacOS/FrontPorchAI*|*/Contents/Frameworks/*|*.framework/*) exit 0 ;;
                esac
                if file "$f" | grep -qiE "mach-o|executable|shared library|dynamically linked"; then
                  codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime \
                    --entitlements "$SIDECAR_ENT" "$f" \
                    2>&1 | grep -v -E "(replacing existing signature|already signed|is not signed)" || true
                fi
              ' _ {} || true

          # Sign the main app bundle last (outermost)
          codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime --entitlements "$ENTITLEMENTS" "$APP_NAME"

          echo "✓ App signed with Developer ID"

      - name: Download VC++ Redistributable
        if: matrix.platform == 'windows'
        run: |
          # Download the latest VC++ 2015-2022 x64 Redistributable from Microsoft's CDN
          # This is bundled into the installer so end-users get it automatically
          $DestDir = "${{ github.workspace }}\${{ matrix.build_path }}\.."
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "$DestDir\vc_redist.x64.exe"
          Write-Host "VC++ Redistributable downloaded to $DestDir"
        shell: pwsh

      - name: Build Windows Installer (Inno Setup)
        if: matrix.platform == 'windows'
        run: |
          $VERSION = "${env:GITHUB_REF_NAME}" -replace '^[vV]', ''
          # Convert 4-part (0.0.4.1) to 3-part for Inno Setup (0.0.4.1 stays as-is)
          choco install innosetup -y --no-progress
          $ISCC = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $ISCC /DMyAppVersion="$VERSION" /DMyAppBuildDir="${{ github.workspace }}\${{ matrix.build_path }}" /DMyAppLicenseFile="${{ github.workspace }}\LICENSE" /DMyAppIconFile="${{ github.workspace }}\windows\runner\resources\app_icon.ico" "installers\windows\setup.iss"
          Copy-Item "installers\windows\Front_Porch_AI_Setup.exe" -Destination "."
        shell: pwsh


      - name: Build macOS PKG
        if: matrix.platform == 'macos'
        env:
          MACOS_INSTALLER_CERT_NAME: ${{ secrets.MACOS_INSTALLER_CERT_NAME }}
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          # Stable channel fixed name for the auto-updater (matches _macosAssetPkg).
          # We also support a versioned copy for manual downloads if desired.
          PKG_NAME="Front_Porch_AI.pkg"
          if [[ "${{ github.workflow }}" == *"Release"* ]]; then
            VERSION="${{ github.event.release.tag_name || github.ref_name }}"
            # Produce the versioned one too (harmless) but the fixed name is what
            # the client (old+new) will look for for auto-update.
            VERSIONED_PKG="Front_Porch_AI_${VERSION}.pkg"
          else
            VERSIONED_PKG=""
          fi
          UNSIGNED_PKG="unsigned_${PKG_NAME}"
          
          echo "Building unsigned .pkg (stable channel fixed name for updater)..."
          pkgbuild \
            --component "$APP_NAME" \
            --install-location /Applications \
            "$UNSIGNED_PKG" || { echo "ERROR: pkgbuild failed"; exit 1; }
            
          echo "Signing .pkg with Installer cert..."
          productsign --sign "$MACOS_INSTALLER_CERT_NAME" "$UNSIGNED_PKG" "$PKG_NAME" || { echo "ERROR: productsign failed"; exit 1; }
          rm -f "$UNSIGNED_PKG"
          if [ -n "$VERSIONED_PKG" ]; then
            cp "$PKG_NAME" "$VERSIONED_PKG" || true
          fi
          echo "✓ PKG created successfully: $PKG_NAME (and $VERSIONED_PKG if applicable)"

      - name: Clean quarantine/FinderInfo from PKG file only (before notarization)
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          # Use the stable fixed name (the one the updater will request).
          PKG_NAME="Front_Porch_AI.pkg"
          if [ -f "$PKG_NAME" ]; then
            echo "Light xattr cleanup on PKG file only (not recursive)"
            xattr -d com.apple.quarantine "$PKG_NAME" 2>/dev/null || true
            xattr -d com.apple.FinderInfo "$PKG_NAME" 2>/dev/null || true
          fi

      - name: Submit final PKG to notarization and Staple
        if: matrix.platform == 'macos'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd build/macos/Build/Products/Release
          # Stable fixed name for the auto-updater (Front_Porch_AI.pkg).
          PKG_NAME="Front_Porch_AI.pkg"
          
          echo "Submitting PKG for notarization..."
          xcrun notarytool submit "$PKG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait || { echo "ERROR: PKG notarization failed"; exit 1; }
          
          echo "Stapling notarization ticket to PKG..."
          xcrun stapler staple "$PKG_NAME"
          xcrun stapler validate "$PKG_NAME" \
            && echo "✓ PKG staple verified" \
            || { echo "⚠ PKG staple validation failed"; exit 1; }
          
          # Move the fixed-name PKG (what the updater looks for) to workspace root.
          # Also move any versioned sibling if present.
          mv "$PKG_NAME" ../../../../../ 2>/dev/null || true
          if ls Front_Porch_AI_*.pkg >/dev/null 2>&1; then
            mv Front_Porch_AI_*.pkg ../../../../../ 2>/dev/null || true
          fi
          
          echo "✓ Build complete: PKG and inner .app are fully notarized and stapled!"

      # Unsigned shim DMG for stable channel (Front_Porch_AI.dmg) — the last bridge.
      - name: Build unsigned shim DMG (legacy name for stable updater transition)
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          # Absolute via GITHUB_WORKSPACE for robustness (review issue 9).
          SHIM_DMG="${GITHUB_WORKSPACE}/Front_Porch_AI.dmg"
          echo "==> Building unsigned shim DMG $SHIM_DMG for stable channel (no codesign/notarize)"
          SHIM_ROOT="/tmp/shim-stable-$$"
          rm -rf "$SHIM_ROOT"
          mkdir -p "$SHIM_ROOT"
          cp -R "$APP_NAME" "$SHIM_ROOT/"
          if hdiutil create -volname "Front Porch AI" -srcfolder "$SHIM_ROOT" -ov -format UDZO "$SHIM_DMG" 2>&1 | tail -3; then
            echo "✓ stable shim DMG via hdiutil"
          else
            brew install create-dmg || true
            "${GITHUB_WORKSPACE}/create-dmg.sh" --skip-jenkins "$SHIM_DMG" "$SHIM_ROOT" || true  # absolute for consistency (Issue B)
          fi
          rm -rf "$SHIM_ROOT"
          ls -l "$SHIM_DMG" || true

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(echo ${GITHUB_REF_NAME} | sed 's/^[vV]//')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Package Linux
        if: matrix.platform == 'linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building packages for version $VERSION"
          
          # 1. Prepare AppImage
          # AppImage standard: AppRun at root, resources in distinct folders
          mkdir -p AppDir/usr/bin
          cp -r ${{ matrix.build_path }}/* AppDir/usr/bin/
          
          # Create Desktop file
          cat <<EOF > AppDir/front_porch_ai.desktop
          [Desktop Entry]
          Name=Front Porch AI
          Exec=front_porch_ai
          Icon=front_porch_ai
          Type=Application
          Categories=Utility;
          Comment=A chilled out frontend for KoboldCPP
          EOF
          
          # Icon management
          if [ -f "assets/images/front_porch_ai_icon.png" ]; then
            cp assets/images/front_porch_ai_icon.png AppDir/front_porch_ai.png
            cp assets/images/front_porch_ai_icon.png AppDir/.DirIcon
          else
            touch AppDir/front_porch_ai.png
            touch AppDir/.DirIcon
          fi
          
          # AppRun - symlink to the binary in usr/bin
          ln -s usr/bin/front_porch_ai AppDir/AppRun
          
          # Create AppImage
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          ./appimagetool AppDir Front_Porch_AI-Linux.AppImage
          
          # 2. Prepare .deb
          # Install to /opt to keep bundle together
          mkdir -p deb/opt/front-porch-ai
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/DEBIAN
          
          cp -r ${{ matrix.build_path }}/* deb/opt/front-porch-ai/
          # Symlink to /usr/bin
          ln -s /opt/front-porch-ai/front_porch_ai deb/usr/bin/front-porch-ai
          
          # Create a .desktop file for the deb that uses the correct symlink name
          cat <<EOF > deb/usr/share/applications/front-porch-ai.desktop
          [Desktop Entry]
          Name=Front Porch AI
          Exec=front-porch-ai
          Icon=front-porch-ai
          Type=Application
          Categories=Utility;
          Comment=A chilled out frontend for KoboldCPP
          EOF
          mkdir -p deb/usr/share/pixmaps
          cp AppDir/front_porch_ai.png deb/usr/share/pixmaps/front-porch-ai.png
          
          cat <<EOF > deb/DEBIAN/control
          Package: front-porch-ai
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Front Porch AI Team
          Description: A chilled out frontend for KoboldCPP.
          EOF
          
          # Post-install script: refresh desktop database so shortcut appears
          cat <<'EOF' > deb/DEBIAN/postinst
          #!/bin/sh
          if command -v update-desktop-database >/dev/null 2>&1; then
            update-desktop-database /usr/share/applications 2>/dev/null || true
          fi
          if command -v gtk-update-icon-cache >/dev/null 2>&1; then
            gtk-update-icon-cache /usr/share/pixmaps 2>/dev/null || true
          fi
          EOF
          chmod 755 deb/DEBIAN/postinst
          dpkg-deb --build deb Front_Porch_AI-Linux.deb
          
          # 3. Prepare .rpm
          sudo apt-get install -y rpm
          mkdir -p rpmroot/{BUILD,RPMS,SOURCES,SPECS,SRPMS,INSTALL}
          
          cat <<EOF > rpmroot/SPECS/front-porch-ai.spec
          Name:           front-porch-ai
          Version:        $VERSION
          Release:        1%{?dist}
          Summary:        Front Porch AI Frontend
          License:        MIT
          URL:            https://github.com/linux4life1/front-porch-AI
          AutoReqProv:    no
          Requires:       gtk3
          Requires:       glib2
          Requires:       libsecret
          
          %description
          A chilled out frontend for KoboldCPP.
          
          %install
          mkdir -p %{buildroot}/opt/front-porch-ai
          mkdir -p %{buildroot}/usr/bin
          cp -r ${GITHUB_WORKSPACE}/${{ matrix.build_path }}/* %{buildroot}/opt/front-porch-ai/
          ln -s /opt/front-porch-ai/front_porch_ai %{buildroot}/usr/bin/front-porch-ai
          
          %files
          /opt/front-porch-ai
          /usr/bin/front-porch-ai
          
          %changelog
          EOF
          
          rpmbuild --define "_topdir $(pwd)/rpmroot" --define "_buildrootdir $(pwd)/rpmroot/INSTALL" -bb rpmroot/SPECS/front-porch-ai.spec
          cp rpmroot/RPMS/x86_64/*.rpm Front_Porch_AI-Linux.rpm
          
          # 4. Standard tar.gz
          cd ${{ matrix.build_path }}
           tar -czvf ../../../../../${{ matrix.asset_name }} .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-${{ matrix.platform }}
          path: |
            Front_Porch_AI-Linux.AppImage
            Front_Porch_AI-Linux.deb
            Front_Porch_AI-Linux.rpm
            Front_Porch_AI_Setup.exe
            Front_Porch_AI.pkg
            Front_Porch_AI.dmg
          if-no-files-found: ignore

  publish-release:
    name: Publish Release
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      # Checkout BEFORE downloading artifacts so the repo (docs/main.md) is present.
      # download-artifact only writes files and won't clobber the checked-out tree,
      # and the release binaries have distinct names from any repo files.
      - name: Checkout Code (for release notes)
        uses: actions/checkout@v5

      - name: Download Build Artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: build-*
          merge-multiple: true

      # Mirror the Beta/Nightly "friendly notes" step: pull the bullet list under the
      # first "## " heading of docs/main.md into the GitHub release body. The in-app
      # "Update Available" dialog renders that body as the user-facing What's New.
      # (The maintainer can still hand-edit the release afterward, e.g. to add credits.)
      - name: Prepare Friendly Release Notes
        id: release_notes
        shell: bash
        run: |
          NOTES_FILE="docs/main.md"
          if [ -f "$NOTES_FILE" ]; then
            BODY=$(awk '
              /^## / { if (in_content) { exit }; in_content=1; next }
              in_content { print }
            ' "$NOTES_FILE" || true)
            if [ -n "$BODY" ]; then
              echo "body<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
              echo "$BODY" >> $GITHUB_OUTPUT
              echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
              echo "Using friendly notes from $NOTES_FILE"
            else
              echo "body=" >> $GITHUB_OUTPUT
              echo "WARNING: no content extracted from $NOTES_FILE (missing '## ' section?)"
            fi
          else
            echo "body=" >> $GITHUB_OUTPUT
            echo "WARNING: $NOTES_FILE not found — release body will be empty"
          fi

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Front_Porch_AI-Linux.AppImage
            Front_Porch_AI-Linux.deb
            Front_Porch_AI-Linux.rpm
            Front_Porch_AI_Setup.exe
            Front_Porch_AI.pkg
            Front_Porch_AI.dmg
          prerelease: ${{ contains(github.ref_name, 'beta') }}
          body: ${{ steps.release_notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish .deb to APT repository at apt.dreamersai.art ──
  publish-apt:
    name: Publish to APT Repository
    needs: [release, publish-release]
    if: ${{ !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'dev') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Build Artifact
        uses: actions/download-artifact@v5
        with:
          name: build-linux

      - name: Deploy .deb to APT Repository
        env:
          SSH_KEY: ${{ secrets.APT_DEPLOY_SSH_KEY }}
        run: |
          # Set up SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/apt_deploy_key
          chmod 600 ~/.ssh/apt_deploy_key

          # Add host key to known_hosts (avoids interactive prompt)
          ssh-keyscan -H dreamersai.art >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-i ~/.ssh/apt_deploy_key -o StrictHostKeyChecking=accept-new"
          REMOTE="apt-deploy@dreamersai.art"
          REPO_PATH="/var/www/apt"

          # Upload the .deb
          echo "Uploading .deb to APT server..."
          scp $SSH_OPTS Front_Porch_AI-Linux.deb "${REMOTE}:/tmp/front-porch-ai-latest.deb"

          # Remove old version and add new one via reprepro
          echo "Publishing to APT repository..."
          ssh $SSH_OPTS "$REMOTE" bash -s <<'REMOTE_SCRIPT'
            set -euo pipefail
            REPO="/var/www/apt"
            DEB="/tmp/front-porch-ai-latest.deb"

            # Remove previous version (reprepro won't overwrite)
            reprepro -b "$REPO" remove stable front-porch-ai 2>/dev/null || true

            # Add new version
            reprepro -b "$REPO" includedeb stable "$DEB"

            # Clean up
            rm -f "$DEB"

            echo "✓ Published to APT repository"
            reprepro -b "$REPO" list stable
          REMOTE_SCRIPT

          # Clean up local SSH key
          rm -f ~/.ssh/apt_deploy_key

  # ── Publish .rpm to RPM repository at rpm.dreamersai.art ──
  publish-rpm:
    name: Publish to RPM Repository
    needs: [release, publish-release]
    if: ${{ !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'dev') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Build Artifact
        uses: actions/download-artifact@v5
        with:
          name: build-linux

      - name: Deploy .rpm to RPM Repository
        env:
          SSH_KEY: ${{ secrets.APT_DEPLOY_SSH_KEY }}
        run: |
          # Set up SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/apt_deploy_key
          chmod 600 ~/.ssh/apt_deploy_key

          # Add host key to known_hosts
          ssh-keyscan -H dreamersai.art >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-i ~/.ssh/apt_deploy_key -o StrictHostKeyChecking=accept-new"
          REMOTE="apt-deploy@dreamersai.art"

          # Upload the .rpm
          echo "Uploading .rpm to RPM server..."
          scp $SSH_OPTS Front_Porch_AI-Linux.rpm "${REMOTE}:/tmp/front-porch-ai-latest.rpm"

          # Replace old version and regenerate metadata
          echo "Publishing to RPM repository..."
          ssh $SSH_OPTS "$REMOTE" bash -s <<'REMOTE_SCRIPT'
            set -euo pipefail
            RPM_REPO="/var/www/rpm"

            # Remove old versions
            rm -f "$RPM_REPO/packages"/Front_Porch_AI*.rpm

            # Add new version
            mv /tmp/front-porch-ai-latest.rpm "$RPM_REPO/packages/"

            # Regenerate repo metadata
            createrepo_c --update "$RPM_REPO"

            echo "✓ Published to RPM repository"
            ls -la "$RPM_REPO/packages/"
          REMOTE_SCRIPT

          # Clean up local SSH key
          rm -f ~/.ssh/apt_deploy_key

  # ── Update AUR stable package (front-porch-ai-bin) ──
  publish-aur:
    name: Update AUR Package
    needs: [release, publish-release]
    if: ${{ !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'dev') }}
    runs-on: ubuntu-latest
    steps:
      - name: Update AUR Package
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          VERSION=$(echo "${GITHUB_REF_NAME}" | sed 's/^[vV]//')

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_key -o StrictHostKeyChecking=accept-new"

          # Clone AUR repo
          git clone ssh://aur@aur.archlinux.org/front-porch-ai-bin.git /tmp/aur
          cd /tmp/aur

          git config user.email "age3dude@gmail.com"
          git config user.name "Sosukeaizen"

          # Update PKGBUILD version
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Regenerate .SRCINFO
          # Install makepkg dependencies (makepkg is part of pacman on Arch, use docker or manual generation on Ubuntu)
          # Manual .SRCINFO generation for Ubuntu runner:
          cat > .SRCINFO <<SRCINFO
          pkgbase = front-porch-ai-bin
          	pkgdesc = A chilled out frontend for KoboldCPP
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/linux4life1/front-porch-AI
          	arch = x86_64
          	license = GPL-3.0-or-later
          	depends = gtk3
          	depends = glib2
          	depends = libsecret
          	provides = front-porch-ai
          	conflicts = front-porch-ai
          	options = !strip
          	options = !debug
          	source = front-porch-ai-bin-${VERSION}.tar.gz::https://github.com/linux4life1/front-porch-AI/releases/download/v${VERSION}/Front_Porch_AI_Linux.tar.gz
          	source = front-porch-ai.desktop
          	source = front-porch-ai.png
          	sha256sums = SKIP
          	sha256sums = SKIP
          	sha256sums = SKIP

          pkgname = front-porch-ai-bin
          SRCINFO

          # Remove leading whitespace from .SRCINFO (heredoc indentation)
          # and strip any stray \r from CRLF line endings
          sed -i 's/^          //' .SRCINFO
          sed -i 's/\r$//' .SRCINFO
          sed -i 's/\r$//' PKGBUILD

          git add -A
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to ${VERSION}"
          git push

          # Clean up
          rm -f ~/.ssh/aur_key
          echo "✓ AUR package updated to ${VERSION}"
