name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            asset_name: Front_Porch_AI_Windows.zip
            build_path: build/windows/x64/runner/Release
          - os: macos-latest
            platform: macos
            asset_name: Front_Porch_AI_MacOS.zip
            build_path: build/macos/Build/Products/Release
          - os: ubuntu-latest
            platform: linux
            asset_name: Front_Porch_AI_Linux.tar.gz
            build_path: build/linux/x64/release/bundle

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev libsecret-1-dev libwebkit2gtk-4.1-dev ninja-build pkg-config cmake

      - name: Install dependencies
        run: flutter pub get

      - name: Build Application
        run: flutter build ${{ matrix.platform }} --release

      - name: Package Windows
        if: matrix.platform == 'windows'
        run: |
          cd ${{ matrix.build_path }}
          Compress-Archive -Path * -DestinationPath ../../../../../${{ matrix.asset_name }}
        shell: pwsh

      - name: Package MacOS
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          echo "Found app bundle: $APP_NAME"
          zip -r ../../../../../${{ matrix.asset_name }} "$APP_NAME"

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: |
          cd ${{ matrix.build_path }}
          tar -czvf ../../../../../${{ matrix.asset_name }} .

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
