name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            asset_name: Front_Porch_AI_Windows.zip
            build_path: build/windows/x64/runner/Release
          - os: macos-latest
            platform: macos
            asset_name: Front_Porch_AI_MacOS.zip
            build_path: build/macos/Build/Products/Release
          - os: ubuntu-22.04
            platform: linux
            asset_name: Front_Porch_AI_Linux.tar.gz
            build_path: build/linux/x64/release/bundle

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev libsecret-1-dev libwebkit2gtk-4.1-dev ninja-build pkg-config cmake libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Sync Version from Tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION=$(echo "$TAG" | sed 's/^[vV]//')
          # Convert 4-part (0.0.4.1) to Flutter format (0.0.4+1)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.([0-9]+)$ ]]; then
            FLUTTER_VERSION="$(echo $VERSION | sed 's/\.\([^.]*\)$/+\1/')"
          else
            FLUTTER_VERSION="${VERSION}+0"
          fi
          echo "Setting version to: $FLUTTER_VERSION"
          # Extract the display version (without build number) for the Dart constant
          DISPLAY_VERSION=$(echo "$FLUTTER_VERSION" | sed 's/+.*//')
          # Use Python for cross-platform reliability (sed can fail silently with Windows \r\n line endings)
          python3 -c "
          import re
          # Update pubspec.yaml
          with open('pubspec.yaml', 'r') as f: content = f.read()
          content = re.sub(r'^version: .*$', 'version: $FLUTTER_VERSION', content, flags=re.MULTILINE)
          with open('pubspec.yaml', 'w') as f: f.write(content)
          # Update Dart version constant
          with open('lib/app_version.dart', 'w') as f:
              f.write(\"/// Single source of truth for the app version.\n\")
              f.write(\"/// Update this constant whenever a new release is made.\n\")
              f.write(\"/// This avoids reliance on platform-specific version resource extraction\n\")
              f.write(\"/// (e.g., PackageInfo.fromPlatform) which can be unreliable on Windows.\n\")
              f.write(\"const String appVersion = '$DISPLAY_VERSION';\n\")
          "
          # Verify both were updated (visible in CI logs)
          echo "Verifying pubspec version:"
          grep '^version:' pubspec.yaml
          echo "Verifying Dart version constant:"
          cat lib/app_version.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Disable inappwebview Linux plugin (uses external browser fallback)
        if: matrix.platform == 'linux'
        run: |
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  flutter_inappwebview_linux:" >> pubspec.yaml
          echo "    path: ci/flutter_inappwebview_linux_stub" >> pubspec.yaml
          flutter pub get

      - name: Build Application
        run: flutter build ${{ matrix.platform }} --release

      - name: Bundle TTS Engines (Kokoro + Piper as standalone binaries)
        shell: bash
        run: |
          DEST="${{ matrix.build_path }}/piper"
          mkdir -p "$DEST"

          # Install TTS dependencies + PyInstaller
          pip install --upgrade pip
          pip install pyinstaller kokoro-onnx soundfile piper_tts pathvalidate piper_phonemize

          # Build Kokoro TTS as a standalone binary
          echo "Building Kokoro TTS binary..."
          pyinstaller kokoro_tts.py \
            --onefile \
            --name kokoro_tts \
            --collect-all kokoro_onnx \
            --collect-all soundfile \
            --hidden-import kokoro_onnx \
            --hidden-import soundfile \
            --hidden-import numpy \
            --hidden-import onnxruntime \
            --distpath "$DEST" \
            --workpath /tmp/kokoro_build \
            --specpath /tmp/kokoro_build \
            --clean \
            --noconfirm
          echo "Kokoro binary built at: $DEST/kokoro_tts"

          # Build Piper TTS as a standalone binary
          echo "Building Piper TTS binary..."
          pyinstaller piper_entry.py \
            --onefile \
            --name piper \
            --collect-all piper \
            --hidden-import piper \
            --hidden-import pathvalidate \
            --hidden-import piper_phonemize \
            --hidden-import onnxruntime \
            --distpath "$DEST" \
            --workpath /tmp/piper_build \
            --specpath /tmp/piper_build \
            --clean \
            --noconfirm
          echo "Piper binary built at: $DEST/piper"

          # For macOS, copy into the app bundle Resources
          if [ "${{ matrix.platform }}" = "macos" ]; then
            APP_NAME=$(ls -d ${{ matrix.build_path }}/*.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              RESOURCES="$APP_NAME/Contents/Resources/piper"
              mkdir -p "$RESOURCES"
              cp "$DEST/kokoro_tts" "$RESOURCES/kokoro_tts"
              cp "$DEST/piper" "$RESOURCES/piper"
              chmod +x "$RESOURCES/kokoro_tts"
              chmod +x "$RESOURCES/piper"
            fi
          fi

          echo "TTS engines bundled at: $DEST"
          ls -la "$DEST"


      - name: Re-sign macOS App Bundle
        if: matrix.platform == 'macos'
        run: |
          APP_NAME=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          echo "Re-signing: $APP_NAME"
          codesign --force --deep --sign - "$APP_NAME"
          echo "Verifying signature..."
          codesign --verify --deep --strict "$APP_NAME"

      - name: Package Windows (zip)
        if: matrix.platform == 'windows'
        run: |
          cd ${{ matrix.build_path }}
          Compress-Archive -Path * -DestinationPath ../../../../../${{ matrix.asset_name }}
        shell: pwsh

      - name: Build Windows Installer (Inno Setup)
        if: matrix.platform == 'windows'
        run: |
          $VERSION = "${env:GITHUB_REF_NAME}" -replace '^[vV]', ''
          # Convert 4-part (0.0.4.1) to 3-part for Inno Setup (0.0.4.1 stays as-is)
          choco install innosetup -y --no-progress
          $ISCC = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $ISCC /DMyAppVersion="$VERSION" /DMyAppBuildDir="${{ github.workspace }}\${{ matrix.build_path }}" /DMyAppLicenseFile="${{ github.workspace }}\LICENSE" /DMyAppIconFile="${{ github.workspace }}\windows\runner\resources\app_icon.ico" "installers\windows\setup.iss"
          Copy-Item "installers\windows\Front_Porch_AI_Setup.exe" -Destination "."
        shell: pwsh

      - name: Package MacOS (DMG)
        if: matrix.platform == 'macos'
        run: |
          brew install create-dmg
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          echo "Found app bundle: $APP_NAME"
          create-dmg \
            --volname "Front Porch AI" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_NAME" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "../../../../../Front_Porch_AI.dmg" \
            "$APP_NAME" || true
          # Fallback to zip if create-dmg fails
          if [ ! -f ../../../../../Front_Porch_AI.dmg ]; then
            echo "DMG creation failed, falling back to zip"
            zip -r ../../../../../${{ matrix.asset_name }} "$APP_NAME"
          fi

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(echo ${GITHUB_REF_NAME} | sed 's/^[vV]//')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Package Linux
        if: matrix.platform == 'linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building packages for version $VERSION"
          
          # 1. Prepare AppImage
          # AppImage standard: AppRun at root, resources in distinct folders
          mkdir -p AppDir/usr/bin
          cp -r ${{ matrix.build_path }}/* AppDir/usr/bin/
          
          # Create Desktop file
          cat <<EOF > AppDir/front_porch_ai.desktop
          [Desktop Entry]
          Name=Front Porch AI
          Exec=front_porch_ai
          Icon=front_porch_ai
          Type=Application
          Categories=Utility;
          EOF
          
          # Icon management
          if [ -f "assets/images/front_porch_ai_icon.png" ]; then
            cp assets/images/front_porch_ai_icon.png AppDir/front_porch_ai.png
            cp assets/images/front_porch_ai_icon.png AppDir/.DirIcon
          else
            touch AppDir/front_porch_ai.png
            touch AppDir/.DirIcon
          fi
          
          # AppRun - symlink to the binary in usr/bin
          ln -s usr/bin/front_porch_ai AppDir/AppRun
          
          # Create AppImage
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          ./appimagetool AppDir Front_Porch_AI-Linux.AppImage
          
          # 2. Prepare .deb
          # Install to /opt to keep bundle together
          mkdir -p deb/opt/front-porch-ai
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/DEBIAN
          
          cp -r ${{ matrix.build_path }}/* deb/opt/front-porch-ai/
          # Symlink to /usr/bin
          ln -s /opt/front-porch-ai/front_porch_ai deb/usr/bin/front-porch-ai
          
          # Copy desktop file and icon
          cp AppDir/front_porch_ai.desktop deb/usr/share/applications/
          mkdir -p deb/usr/share/pixmaps
          cp AppDir/front_porch_ai.png deb/usr/share/pixmaps/
          
          cat <<EOF > deb/DEBIAN/control
          Package: front-porch-ai
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Front Porch AI Team
          Description: A chilled out frontend for KoboldCPP.
          EOF
          dpkg-deb --build deb Front_Porch_AI-Linux.deb
          
          # 3. Prepare .rpm
          sudo apt-get install -y rpm
          mkdir -p rpmroot/{BUILD,RPMS,SOURCES,SPECS,SRPMS,INSTALL}
          
          cat <<EOF > rpmroot/SPECS/front-porch-ai.spec
          Name:           front-porch-ai
          Version:        $VERSION
          Release:        1%{?dist}
          Summary:        Front Porch AI Frontend
          License:        MIT
          URL:            https://github.com/linux4life1/front-porch-AI
          
          %description
          A chilled out frontend for KoboldCPP.
          
          %install
          mkdir -p %{buildroot}/opt/front-porch-ai
          mkdir -p %{buildroot}/usr/bin
          cp -r ${GITHUB_WORKSPACE}/${{ matrix.build_path }}/* %{buildroot}/opt/front-porch-ai/
          ln -s /opt/front-porch-ai/front_porch_ai %{buildroot}/usr/bin/front-porch-ai
          
          %files
          /opt/front-porch-ai
          /usr/bin/front-porch-ai
          
          %changelog
          EOF
          
          rpmbuild --define "_topdir $(pwd)/rpmroot" --define "_buildrootdir $(pwd)/rpmroot/INSTALL" -bb rpmroot/SPECS/front-porch-ai.spec
          cp rpmroot/RPMS/x86_64/*.rpm Front_Porch_AI-Linux.rpm
          
          # 4. Standard tar.gz
          cd ${{ matrix.build_path }}
          tar -czvf ../../../../../${{ matrix.asset_name }} .

      - name: Create or Update Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            Front_Porch_AI-Linux.AppImage
            Front_Porch_AI-Linux.deb
            Front_Porch_AI-Linux.rpm
            Front_Porch_AI_Setup.exe
            Front_Porch_AI.dmg
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
