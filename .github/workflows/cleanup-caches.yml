name: Cleanup Old ML Engine Caches

on:
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday at 03:00 UTC
  workflow_dispatch:      # Allow manual trigger from Actions tab

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old ml-engines caches
        uses: actions/github-script@v7
        with:
          script: |
            const keyPrefix = 'ml-engines-';
            const daysToKeep = 10;   // Keep the last 10 days of caches (adjust as needed)

            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - daysToKeep);

            console.log(`Deleting ${keyPrefix} caches older than ${cutoffDate.toISOString()}`);

            const { data: caches } = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            let deleted = 0;
            for (const cache of caches.actions_caches) {
              if (cache.key.startsWith(keyPrefix)) {
                const lastAccessed = new Date(cache.last_accessed_at);
                if (lastAccessed < cutoffDate) {
                  console.log(`Deleting cache: ${cache.key} (last accessed: ${cache.last_accessed_at}, size: ${cache.size_in_bytes} bytes)`);
                  try {
                    await github.rest.actions.deleteActionsCacheById({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      cache_id: cache.id
                    });
                    deleted++;
                  } catch (err) {
                    console.log(`Failed to delete cache ${cache.key}: ${err.message}`);
                  }
                }
              }
            }

            console.log(`Cleanup complete. Deleted ${deleted} old ML engine caches.`);
