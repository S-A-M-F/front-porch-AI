name: Nightly Build (Rawhide)

# IMPORTANT: GitHub ONLY evaluates `schedule:` (cron) triggers from workflow files
# that exist on the repository's DEFAULT branch (main). The schedule here will NOT
# fire from changes made only on Rawhide.
#
# When editing this file (especially the "Compute Rawhide Nightly Version" step that
# patches lib/app_version.dart), you MUST also ensure an up-to-date copy lands on
# `main`. Otherwise the 07:00 UTC Rawhide builds will use a stale writer and fail
# with "Undefined name" compile errors for any new getters/symbols (e.g. isNightlyBuild).
#
# The job itself checks out `ref: Rawhide` for the actual source, but the workflow
# definition (including the sed/python patch logic) always comes from main's copy.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets for macOS Notarization (set in repo Settings → Secrets and variables → Actions)
#
#   MACOS_CERTIFICATE         → Base64-encoded .p12 of your "Developer ID Application" certificate + private key
#   MACOS_CERTIFICATE_PWD     → Password for the .p12 file
#   MACOS_CERTIFICATE_NAME    → Exact certificate name, e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                  → Your Apple ID email
#   APPLE_ID_PASSWORD         → App-Specific Password (not your normal Apple password)
#   APPLE_TEAM_ID             → Your 10-character Team ID (from developer.apple.com)
#
# Security notes:
# - We use `::add-mask::` to proactively mask MACOS_CERTIFICATE_NAME and APPLE_TEAM_ID
#   in all logs for the macOS job. This helps even if the values are accidentally echoed.
# - Never manually `echo` these secrets in steps.
#
# Without these secrets the macOS job will skip real signing + notarization and fall back to ad-hoc (for PR testing).
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  nightly:
    name: Build Nightly
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build_path: build/windows/x64/runner/Release
          - os: macos-latest
            platform: macos
            build_path: build/macos/Build/Products/Release
          - os: ubuntu-22.04
            platform: linux
            asset_name: Front_Porch_AI_Nightly-Linux.tar.gz
            build_path: build/linux/x64/release/bundle

    steps:
      - name: Checkout Rawhide
        uses: actions/checkout@v4
        with:
          ref: Rawhide

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Setup Python (with pip cache)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev libsecret-1-dev libwebkit2gtk-4.1-dev ninja-build pkg-config cmake libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Compute Rawhide Nightly Version
        id: version
        shell: bash
        run: |
          DATE=$(date +%Y%m%d)
          SHA=$(git rev-parse --short HEAD)
          VERSION="rawhide.${DATE}.${SHA}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Setting nightly version to: $VERSION"

          # Patch only the version string in the existing app_version.dart.
          # This leaves isPreRelease, isNightlyBuild, stableVersionBase, and all comments
          # exactly as they are committed on the Rawhide branch — no duplication.
          # Prevents "undefined name" compile failures when new getters are added.
          sed -i.bak "s/^const String appVersion = '.*';$/const String appVersion = '$VERSION';/" lib/app_version.dart
          rm -f lib/app_version.dart.bak

          echo "Version written: $VERSION"
          echo "Current lib/app_version.dart (after patch):"
          cat lib/app_version.dart

      - name: Prepare Friendly Release Notes (for in-app update dialog)
        id: release_notes
        shell: bash
        run: |
          NOTES_FILE="docs/Rawhide.md"

          if [ -f "$NOTES_FILE" ]; then
            # Extract the main content after the title and first intro section.
            # This keeps the notes friendly and focused for the update dialog.
            BODY=$(awk '
              /^## / { 
                if (in_content) { exit } 
                in_content=1; 
                next 
              }
              in_content { print }
            ' "$NOTES_FILE")

            if [ -n "$BODY" ]; then
              echo "body<<EOF" >> $GITHUB_OUTPUT
              echo "$BODY" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              echo "Using notes from $NOTES_FILE"
            else
              echo 'body=**Rawhide Nightly** — Latest development from the Rawhide branch.' >> $GITHUB_OUTPUT
            fi
          else
            echo "No $NOTES_FILE found — using fallback notes"
            echo 'body=**Rawhide Nightly** — Bleeding-edge development. See the README for current focus areas.' >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Disable inappwebview Linux plugin (uses external browser fallback)
        if: matrix.platform == 'linux'
        run: |
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  flutter_inappwebview_linux:" >> pubspec.yaml
          echo "    path: ci/flutter_inappwebview_linux_stub" >> pubspec.yaml
          flutter pub get

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts (embed_server + ort prebuilts)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "tools/embed_server"

      - name: Build Application
        if: matrix.platform != 'linux'
        run: flutter build ${{ matrix.platform }} --release

      - name: Build Application (Linux)
        if: matrix.platform == 'linux'
        env:
          CXXFLAGS: "-Wno-unknown-warning-option"
        run: flutter build linux --release

      - name: Rename macOS app bundle for Rawhide Nightly (collision avoidance)
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          if [ -d FrontPorchAI.app ]; then
            mv FrontPorchAI.app FrontPorchAI-Rawhide.app
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Front Porch AI Nightly" FrontPorchAI-Rawhide.app/Contents/Info.plist 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleName Front Porch AI Nightly" FrontPorchAI-Rawhide.app/Contents/Info.plist 2>/dev/null || true
            # Give Nightly its OWN bundle identifier — this is the macOS twin of the
            # Windows per-channel-AppId fix. Stable ships com.linux4life1.frontPorchAi.
            # Nightly previously ALSO shipped that same id, so /Applications had two
            # different .app bundles claiming one identity (stable front_porch_ai.app +
            # FrontPorchAI-Rawhide.app). When the in-app updater ran `open <pkg>`, the
            # macOS Installer's bundle-relocation looked up that shared id, found two
            # candidates, and the .pkg payload never reliably overwrote the running
            # Nightly bundle — so the app stayed on the old build and kept re-prompting
            # "Update Available" forever (the macOS Nightly update loop).
            #
            # A distinct id makes relocation unambiguous: exactly one bundle on disk
            # claims com.linux4life1.frontPorchAi.nightly, so the Installer overwrites
            # the Nightly bundle in place (wherever the user keeps it) and the loop ends.
            # IMPORTANT: this must happen BEFORE code signing below — signing seals
            # Info.plist, so the id has to be final here.
            #
            # Data safety: the app is NOT sandboxed (see macos/Runner/Release.entitlements),
            # so chats/characters live in ~/Documents/FrontPorchAI-Beta and are keyed by
            # the FrontPorchAI-Beta dir + isPreRelease, NOT by the bundle id — they are
            # untouched. Only macOS NSUserDefaults (which IS bundle-id-keyed) moves to a
            # new domain, i.e. a one-time reset of Nightly's app settings on changeover.
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.linux4life1.frontPorchAi.nightly" FrontPorchAI-Rawhide.app/Contents/Info.plist 2>/dev/null || true
          fi

      - name: Bundle ML Engines (Kokoro TTS, Piper TTS, Whisper STT, ONNX Embeddings)
        shell: bash
        run: |
          # ML sidecars are ALWAYS built fresh from source — caching of this step is
          # deliberately DISABLED. A previous "Cache ML Engines" step cached the ENTIRE
          # build directory (which also contains the compiled Flutter app), so on a cache
          # hit it restored a STALE app over the fresh `flutter build` output — shipping
          # weeks-old code under fresh version tags and causing an endless "Update
          # Available" loop on every platform (the published rawhide.20260625 .pkg
          # actually contained rawhide.20260621 code). Rather than risk that class of
          # "everything says current but isn't" bug ever again, we eat the sidecar build
          # time on every run. Correctness > a few minutes of CI. The other caches
          # (Flutter SDK, pub, pip, cargo/rust-cache) only cache build *inputs*, never
          # the app output, so they remain safe and are kept.
          echo "Building ML engines from source (caching intentionally disabled)"
          DEST="${{ matrix.build_path }}/piper"
            mkdir -p "$DEST"

            # Install TTS dependencies + PyInstaller
            pip install pyinstaller kokoro-onnx soundfile piper_tts pathvalidate faster-whisper numpy onnxruntime transformers huggingface_hub

            # Build Kokoro TTS as a standalone directory bundle
            echo "Building Kokoro TTS binary..."
            pyinstaller kokoro_tts.py \
              --onedir \
              --name kokoro_tts \
              --collect-all kokoro_onnx \
              --collect-all soundfile \
              --collect-all language_tags \
              --collect-all csvw \
              --collect-all segments \
              --collect-all phonemizer \
              --collect-all espeakng_loader \
              --hidden-import kokoro_onnx \
              --hidden-import soundfile \
              --hidden-import numpy \
              --hidden-import onnxruntime \
              --distpath "$DEST" \
              --workpath ./build_tmp/kokoro \
              --specpath ./build_tmp/kokoro \
              --clean \
              --exclude-module torch \
              --exclude-module torchvision \
              --exclude-module torchaudio \
              --noconfirm
            echo "Kokoro built at: $DEST/kokoro_tts/"

            # Build Piper TTS as a standalone directory bundle
            echo "Building Piper TTS binary..."
            pyinstaller piper_entry.py \
              --onedir \
              --name piper \
              --collect-all piper \
              --hidden-import piper \
              --hidden-import pathvalidate \
              --hidden-import piper_phonemize \
              --hidden-import onnxruntime \
              --distpath "$DEST" \
              --workpath ./build_tmp/piper \
              --specpath ./build_tmp/piper \
              --clean \
              --exclude-module torch \
              --exclude-module torchvision \
              --exclude-module torchaudio \
              --noconfirm
            echo "Piper built at: $DEST/piper/"

            # Build Whisper STT as a standalone directory bundle
            echo "Building Whisper STT binary..."
            STT_DEST="${{ matrix.build_path }}"
            pyinstaller whisper_stt.py \
              --onedir \
              --name whisper_stt \
              --collect-all faster_whisper \
              --hidden-import faster_whisper \
              --hidden-import ctranslate2 \
              --hidden-import huggingface_hub \
              --hidden-import tokenizers \
              --distpath "$STT_DEST" \
              --workpath ./build_tmp/whisper \
              --specpath ./build_tmp/whisper \
              --clean \
              --exclude-module torch \
              --exclude-module torchvision \
              --exclude-module torchaudio \
              --noconfirm
            echo "Whisper STT built at: $STT_DEST/whisper_stt/"

            # Build Embedding Server (Rust binary)
            # NOTE: Uses prebuilt ONNX Runtime static libs downloaded by ort-sys from
            # parcel.pyke.io. These downloads are occasionally flaky (timeouts/5xx).
            # We retry + rely on rust-cache + ML-engines-cache to avoid repeated downloads.
            echo "Building Embedding Server (Rust)..."
            cd tools/embed_server
            for attempt in 1 2 3; do
              if cargo build --release; then
                echo "cargo build succeeded on attempt $attempt"
                break
              else
                echo "cargo build attempt $attempt failed"
                if [ $attempt -lt 3 ]; then
                  echo "Retrying in 15s..."
                  sleep 15
                else
                  echo "ERROR: cargo build failed after 3 attempts"
                  exit 1
                fi
              fi
            done
            cd ../..
            EMBED_BINARY="tools/embed_server/target/release/embed_server"
            if [ "${{ matrix.platform }}" = "windows" ]; then
              EMBED_BINARY="tools/embed_server/target/release/embed_server.exe"
            fi
            mkdir -p "$STT_DEST/embed_server"
            cp "$EMBED_BINARY" "$STT_DEST/embed_server/"
            echo "Embedding server built at: $STT_DEST/embed_server/"

            # Build Sentiment Classifier (expression images ONNX)
            echo "Building Sentiment Classifier binary..."
            pyinstaller sentiment_classifier.py \
              --onedir \
              --name sentiment_classifier \
              --collect-all huggingface_hub \
              --collect-all transformers \
              --collect-all numpy \
              --collect-all onnxruntime \
              --hidden-import huggingface_hub \
              --hidden-import transformers \
              --hidden-import numpy \
              --hidden-import onnxruntime \
              --distpath "$STT_DEST" \
              --workpath ./build_tmp/sentiment \
              --specpath ./build_tmp/sentiment \
              --clean \
              --exclude-module torch \
              --exclude-module torchvision \
              --exclude-module torchaudio \
              --noconfirm
            echo "Sentiment classifier built at: $STT_DEST/sentiment_classifier/"

            # Build Draw Things gRPC client (proper PyInstaller bundle for release .app)
            # --add-data includes the sibling .py source files (client.py, pb2 files, etc.)
            # that dt_grpc_client.py imports via sys.path.insert(0, dirname(__file__)).
            # Without --add-data these files are absent inside the frozen bundle, causing
            # ImportError in .app builds (while flutter run works because the raw .py files
            # are on disk and sys.path.insert finds them).
            # --paths tells PyInstaller to trace imports from the sibling directory at
            # bundle time, so hidden-import client / imageService_pb2 are actually found.
            echo "Building Draw Things gRPC client..."
            # Use $(pwd) absolute paths for --add-data: when --specpath is set,
            # PyInstaller resolves relative paths relative to the spec file location
            # (./build_tmp/dt_grpc/), not the workspace root. Absolute paths are
            # unambiguous regardless of where the spec file lives.
            GRPC_SRC="$(pwd)/tools/dt-grpc-python"
            pyinstaller "$GRPC_SRC/dt_grpc_client.py" \
              --onedir \
              --name dt_grpc_client \
              --paths "$GRPC_SRC" \
              --add-data "$GRPC_SRC/client.py:." \
              --add-data "$GRPC_SRC/imageService_pb2.py:." \
              --add-data "$GRPC_SRC/imageService_pb2_grpc.py:." \
              --add-data "$GRPC_SRC/GenerationConfiguration.py:." \
              --add-data "$GRPC_SRC/SamplerType.py:." \
              --add-data "$GRPC_SRC/SeedMode.py:." \
              --add-data "$GRPC_SRC/LoRA.py:." \
              --add-data "$GRPC_SRC/LoRAMode.py:." \
              --add-data "$GRPC_SRC/Control.py:." \
              --add-data "$GRPC_SRC/ControlInputType.py:." \
              --add-data "$GRPC_SRC/ControlMode.py:." \
              --add-data "$GRPC_SRC/ca_chain.pem:." \
              --collect-all grpcio \
              --collect-all flatbuffers \
              --collect-all fpzip \
              --collect-all numpy \
              --collect-all PIL \
              --hidden-import grpc \
              --hidden-import grpc._cython \
              --hidden-import grpcio \
              --hidden-import flatbuffers \
              --hidden-import fpzip \
              --hidden-import numpy \
              --hidden-import PIL \
              --hidden-import PIL.Image \
              --hidden-import imageService_pb2 \
              --hidden-import imageService_pb2_grpc \
              --hidden-import GenerationConfiguration \
              --hidden-import SamplerType \
              --hidden-import SeedMode \
              --hidden-import LoRA \
              --hidden-import LoRAMode \
              --hidden-import client \
              --distpath "$STT_DEST" \
              --workpath ./build_tmp/dt_grpc \
              --specpath ./build_tmp/dt_grpc \
              --clean \
              --exclude-module torch \
              --exclude-module torchvision \
              --exclude-module torchaudio \
              --noconfirm
            echo "Draw Things gRPC client built at: $STT_DEST/dt_grpc_client/"

          # For macOS, copy into the app bundle Resources (always runs)
          if [ "${{ matrix.platform }}" = "macos" ]; then
            APP_NAME=$(ls -d ${{ matrix.build_path }}/*.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              RESOURCES="$APP_NAME/Contents/Resources/piper"
              mkdir -p "$RESOURCES"
              cp -R "${{ matrix.build_path }}/piper/kokoro_tts" "$RESOURCES/kokoro_tts" 2>/dev/null || true
              cp -R "${{ matrix.build_path }}/piper/piper" "$RESOURCES/piper" 2>/dev/null || true
              chmod +x "$RESOURCES/kokoro_tts/kokoro_tts" 2>/dev/null || true
              chmod +x "$RESOURCES/piper/piper" 2>/dev/null || true

              STT_RESOURCES="$APP_NAME/Contents/Resources/whisper_stt"
              mkdir -p "$STT_RESOURCES"
              cp -R "${{ matrix.build_path }}/whisper_stt/"* "$STT_RESOURCES/" 2>/dev/null || true
              chmod +x "$STT_RESOURCES/whisper_stt" 2>/dev/null || true

              EMBED_RESOURCES="$APP_NAME/Contents/Resources/embed_server"
              mkdir -p "$EMBED_RESOURCES"
              cp -R "${{ matrix.build_path }}/embed_server/"* "$EMBED_RESOURCES/" 2>/dev/null || true
              chmod +x "$EMBED_RESOURCES/embed_server" 2>/dev/null || true

              SENTIMENT_RESOURCES="$APP_NAME/Contents/Resources/sentiment_classifier"
              mkdir -p "$SENTIMENT_RESOURCES"
              cp -R "${{ matrix.build_path }}/sentiment_classifier/"* "$SENTIMENT_RESOURCES/" 2>/dev/null || true
              chmod +x "$SENTIMENT_RESOURCES/sentiment_classifier" 2>/dev/null || true

              # Draw Things gRPC client (proper bundled executable, not raw sources)
              DT_RESOURCES="$APP_NAME/Contents/Resources/dt_grpc"
              mkdir -p "$DT_RESOURCES"
              cp -R "${{ matrix.build_path }}/dt_grpc_client" "$DT_RESOURCES/" 2>/dev/null || true
              chmod +x "$DT_RESOURCES/dt_grpc_client/dt_grpc_client" 2>/dev/null || true
            fi
          fi

          echo "ML engine bundling step complete"

      - name: Download VC++ Redistributable (Windows)
        if: matrix.platform == 'windows'
        run: |
          $DestDir = "${{ github.workspace }}\${{ matrix.build_path }}\.."
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "$DestDir\vc_redist.x64.exe"
        shell: pwsh

      - name: Build Windows Installer (Inno Setup)
        if: matrix.platform == 'windows'
        run: |
          choco install innosetup -y --no-progress
          $ISCC = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $ISCC /DPRE_RELEASE=1 /DNIGHTLY=1 /DMyAppVersion="${{ steps.version.outputs.VERSION }}" /DMyAppBuildDir="${{ github.workspace }}\${{ matrix.build_path }}" /DMyAppLicenseFile="${{ github.workspace }}\LICENSE" /DMyAppIconFile="${{ github.workspace }}\windows\runner\resources\app_icon.ico" "installers\windows\setup.iss"
          # The .iss produces Front_Porch_AI_Beta_Setup.exe when PRE_RELEASE=1 — rename it for Nightly
          Copy-Item "installers\windows\Front_Porch_AI_Beta_Setup.exe" -Destination "Front_Porch_AI_Nightly_Setup.exe" -Force
        shell: pwsh

      - name: Ensure correct Nightly artifact names
        shell: bash
        run: |
          echo "Artifact naming normalized for Nightly"
      # ── Real Developer ID Code Signing + Notarization (macOS only) ──
      - name: Mask sensitive certificate values (prevent accidental log leakage)
        if: matrix.platform == 'macos'
        run: |
          # These values will be masked in all logs for this job, even if they
          # accidentally appear in command output, error messages, or env dumps.
          echo "::add-mask::${{ secrets.MACOS_CERTIFICATE_NAME }}"
          echo "::add-mask::${{ secrets.APPLE_TEAM_ID }}"

      - name: Import Apple Developer Certificate
        if: matrix.platform == 'macos'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Create a temporary keychain
          security create-keychain -p "" "$KEYCHAIN_PATH" 2>/dev/null || true
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          # Decode and import the .p12 certificate
          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign

          # Allow codesign to use the key without prompting
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

          # Make the temporary keychain the default for this job
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          echo "Certificate imported successfully"

      - name: Verify certificate is available
        if: matrix.platform == 'macos'
        env:
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          echo "Looking for certificate identity..."
          security find-identity -v -p codesigning

          if ! security find-identity -v -p codesigning | grep -q "$MACOS_CERTIFICATE_NAME"; then
            echo "ERROR: Certificate '$MACOS_CERTIFICATE_NAME' was not found in the keychain after import."
            echo "This usually means the certificate name/hash in the secret does not exactly match."
            exit 1
          fi

          echo "✓ Certificate identity found in keychain"

      # macOS signing + PKG notarization flow (PKG is now primary):
      #
      # 1. Clean xattrs from the built .app (must be before codesigning).
      # 2. Sign the .app bundle (inside-out: frameworks → Resources Mach-O → app).
      # 3. (Legacy DMG comments removed — we now build bare .pkg + staple it.)
      # 4. pkgbuild + productsign the .pkg (using Installer cert).
      # 5. Notarize + staple the .pkg.
      # 6. Separately: build unsigned shim .dmg (see step below) for updater compat only.
      # The shim is never signed/notarized; the real .pkg is.
      - name: Clean xattrs from app bundle (before code signing)
        if: matrix.platform == 'macos'
        run: |
          APP_PATH=$(ls -d build/macos/Build/Products/Release/*.app 2>/dev/null | head -1)
          echo "Cleaning xattrs on $APP_PATH (must be before codesigning and notarization)"
          xattr -cr "$APP_PATH" || true
          find "$APP_PATH" -exec xattr -d com.apple.FinderInfo {} + 2>/dev/null || true

      - name: Code Sign macOS App (Developer ID)
        if: matrix.platform == 'macos'
        env:
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
        run: |
          APP_NAME=$(ls -d ${{ matrix.build_path }}/*.app | head -1)
          ENTITLEMENTS="${{ github.workspace }}/macos/Runner/Release.entitlements"
          # Sidecar entitlements: required for all PyInstaller bundles under hardened
          # runtime. PyInstaller's boot-loader needs:
          #   - cs.disable-library-validation   (load unsigned .so extension modules
          #                                      bundled inside _internal/)
          #   - cs.allow-unsigned-executable-memory (mmap the .pyc archive as exec)
          # Without these, macOS kills the sidecar immediately when the app runs.
          SIDECAR_ENT="${{ github.workspace }}/macos/Runner/Sidecar.entitlements"

          # Parallelize signing across the thousands of Mach-O files in the
          # PyInstaller sidecars. Passes run inside-out (the main .app is signed
          # LAST); only distinct files WITHIN a pass run in parallel. BSD xargs on
          # macOS, so no GNU-only flags and we guard against empty input.
          #
          # Two distinct failure modes are handled here:
          #
          # 1. TIMESTAMP THROTTLE (intermittent "Invalid"): each
          #    `codesign --timestamp` is a network round-trip to Apple's timestamp
          #    server, which throttles under this parallel burst. Every codesign
          #    RETRIES with backoff to heal the throttle.
          #
          # 2. AMBIGUOUS PyInstaller FRAMEWORKS (deterministic "Invalid"): PyInstaller's
          #    frameworks are already versioned (Versions/<X.Y>/<name> is the real
          #    Mach-O) but ALSO carry a DUPLICATE real binary/Resources at the bundle
          #    ROOT. A real Mach-O at the root looks app-like while Versions/ looks
          #    framework-like, so codesign reports "bundle format is ambiguous (could
          #    be app or framework)" and refuses to SEAL the framework — and Apple
          #    then rejects notarization with "The signature of the binary is invalid."
          #    The dedicated framework pass below normalizes each framework to the
          #    canonical layout (root entries become symlinks into Versions/Current),
          #    SEALS it, and HARD-fails on a local `codesign --verify --deep --strict`
          #    so we never submit a framework Apple would reject.
          # If Apple still rejects anything, the notarize step below fetches
          # `notarytool log` so the precise reason is in the CI log.
          export MACOS_CERTIFICATE_NAME SIDECAR_ENT ENTITLEMENTS
          JOBS=8

          echo "Code signing $APP_NAME with hardened runtime using Developer ID certificate (parallel x$JOBS, with retries)..."

          # Pass 1 — frameworks and dylibs first (inside-out).
          { find "$APP_NAME/Contents/Frameworks" \( -name "*.framework" -o -name "*.dylib" \) -print0 2>/dev/null || true; } \
            | xargs -0 -P "$JOBS" -I {} bash -c '
                f="$1"; [ -n "$f" ] || exit 0
                i=0
                until codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime "$f" >"/tmp/cs.$$.log" 2>&1; do
                  i=$((i + 1))
                  if [ "$i" -ge 4 ]; then echo "  ⚠ codesign skipped after 4 tries (continuing — Apple still notarizes; matches the long-standing pipeline): $f" >&2; break; fi
                  sleep $((i * 2))
                done
                rm -f "/tmp/cs.$$.log"
              ' _ {}

          echo "    Signing loose Mach-O files under Resources (excluding *.framework internals)..."
          { find "$APP_NAME/Contents/Resources" -type f ! -path '*.framework/*' -print0 2>/dev/null || true; } \
            | xargs -0 -P "$JOBS" -I {} bash -c '
                f="$1"; [ -n "$f" ] || exit 0
                file "$f" | grep -q "Mach-O" || exit 0
                i=0
                until codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime --entitlements "$SIDECAR_ENT" "$f" >"/tmp/cs.$$.log" 2>&1; do
                  i=$((i + 1))
                  if [ "$i" -ge 4 ]; then echo "  ⚠ codesign skipped after 4 tries (continuing — non-framework Mach-O, throttle): $f" >&2; break; fi
                  sleep $((i * 2))
                done
                rm -f "/tmp/cs.$$.log"
              ' _ {}

          echo "    Normalizing + signing nested *.framework bundles (PyInstaller layout)..."
          # Ground truth from a failed run's structure dump: PyInstaller's frameworks
          # are NOT flat — they are already versioned (Versions/<X.Y>/<name> is the
          # real Mach-O, with a Versions/Current). The problem is that PyInstaller
          # ALSO drops a DUPLICATE real binary (and real Resources/Headers) at the
          # framework ROOT. A real Mach-O at the bundle root looks app-like while
          # Versions/ looks framework-like, so codesign reports
          #   "bundle format is ambiguous (could be app or framework)"
          # and refuses to seal it — which is why notarization then reports
          #   "The signature of the binary is invalid."
          # Fix: normalize to the canonical framework layout — the root entries must
          # be SYMLINKS into Versions/Current, and Versions/Current a symlink to the
          # real version dir — then codesign can seal the framework cleanly. The real
          # python.org Info.plist already present in the version dir is used as-is. A
          # hard local `codesign --verify --deep --strict` gate means we never submit
          # a framework Apple would reject (and dumps the structure if a guess is off).
          while IFS= read -r -d '' fw; do
            name="$(basename "$fw" .framework)"

            # Discover the real version dir: a dir under Versions/ (not Current, not a
            # stray A) that holds the real principal binary.
            realver=""
            shopt -s nullglob
            for cand in "$fw"/Versions/*/; do
              cn="$(basename "$cand")"
              case "$cn" in Current) continue;; esac
              if [ -f "$cand$name" ] && [ ! -L "${cand}$name" ]; then realver="$cn"; break; fi
            done
            shopt -u nullglob

            if [ -n "$realver" ]; then
              # Remove any stray Versions/A a prior run of this script created (it only
              # ever held a synthesized Info.plist, never a binary), unless it IS the
              # real version we just found.
              if [ "$realver" != "A" ] && [ -d "$fw/Versions/A" ] && [ ! -f "$fw/Versions/A/$name" ]; then
                rm -rf "$fw/Versions/A"
              fi
              # Versions/Current → real version (replace whatever is there).
              rm -rf "$fw/Versions/Current"
              ln -s "$realver" "$fw/Versions/Current"
              # Root entries → symlinks into Versions/Current (drop the duplicate root
              # binary; this is what clears the "ambiguous bundle" error).
              for sub in "$name" Resources Headers Modules; do
                if [ -e "$fw/Versions/$realver/$sub" ] && [ ! -L "$fw/$sub" ]; then
                  rm -rf "$fw/$sub"
                  ln -s "Versions/Current/$sub" "$fw/$sub"
                fi
              done
              echo "      ↻ normalized framework layout: $fw (version $realver)"
            fi

            # Sign any non-principal nested Mach-O (.so/.dylib) inside the version first.
            tgtver="${realver:+$fw/Versions/$realver}"; tgtver="${tgtver:-$fw}"
            while IFS= read -r -d '' inner; do
              case "$inner" in */"$name") [ -n "$realver" ] && [ "$inner" = "$fw/Versions/$realver/$name" ] && continue;; esac
              file "$inner" | grep -q "Mach-O" || continue
              codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime "$inner" >/dev/null 2>&1 || true
            done < <(find "$tgtver" -type f -print0 2>/dev/null || true)

            # Seal the framework bundle (also signs the principal binary). HARD fail.
            i=0
            until codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime "$fw" >/tmp/cs_fw.log 2>&1; do
              i=$((i + 1)); if [ "$i" -ge 4 ]; then echo "::error::Failed to sign framework $fw"; cat /tmp/cs_fw.log; ls -laR "$fw" | head -120; exit 1; fi
              sleep $((i * 2))
            done

            # Verify locally exactly how Apple's notary does. Never ship a bad seal.
            if ! codesign --verify --deep --strict --verbose=2 "$fw" >/tmp/cs_vfy.log 2>&1; then
              echo "::error::codesign --verify failed for framework $fw"; cat /tmp/cs_vfy.log
              echo "---- framework structure ----"; ls -laR "$fw" | head -120
              exit 1
            fi
            echo "      ✓ framework signed + verified: $fw"
          done < <(find "$APP_NAME/Contents/Resources" -type d -name "*.framework" -print0 2>/dev/null || true)

          echo "    Broad catch-all pass: force-signing EVERY remaining Mach-O under Resources..."
          { find "$APP_NAME/Contents/Resources" -type f -print0 2>/dev/null || true; } \
            | xargs -0 -P "$JOBS" -I {} bash -c '
                f="$1"; [ -n "$f" ] || exit 0
                case "$f" in
                  */Contents/MacOS/FrontPorchAI*|*/Contents/Frameworks/*|*.framework/*) exit 0 ;;
                esac
                file "$f" | grep -qiE "mach-o|executable|shared library|dynamically linked" || exit 0
                i=0
                until codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime --entitlements "$SIDECAR_ENT" "$f" >"/tmp/cs.$$.log" 2>&1; do
                  i=$((i + 1))
                  if [ "$i" -ge 4 ]; then echo "  ⚠ codesign skipped after 4 tries (continuing — throttle): $f" >&2; break; fi
                  sleep $((i * 2))
                done
                rm -f "/tmp/cs.$$.log"
              ' _ {}

          # Sign the main app bundle last (outermost)
          i=0
          until codesign --force --sign "$MACOS_CERTIFICATE_NAME" --timestamp --options runtime --entitlements "$ENTITLEMENTS" "$APP_NAME" >/tmp/cs_app.log 2>&1; do
            i=$((i + 1))
            if [ "$i" -ge 4 ]; then echo "::error::codesign failed after 4 tries for the app bundle"; cat /tmp/cs_app.log; exit 1; fi
            sleep $((i * 2))
          done

          echo "✓ App signed with Developer ID (best-effort; the notarize step fetches Apple's log if anything is actually rejected)"

      - name: Build macOS PKG
        if: matrix.platform == 'macos'
        env:
          MACOS_INSTALLER_CERT_NAME: ${{ secrets.MACOS_INSTALLER_CERT_NAME }}
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          PKG_NAME="Front_Porch_AI_Nightly.pkg"
          if [[ "${{ github.workflow }}" == *"Release"* ]]; then
            VERSION="${{ github.event.release.tag_name || github.ref_name }}"
            PKG_NAME="Front_Porch_AI_${VERSION}.pkg"
          fi
          UNSIGNED_PKG="unsigned_${PKG_NAME}"

          # Build a NON-RELOCATABLE component pkg. `pkgbuild --component` is relocatable
          # by default — on a channel-id transition (old shared id com.linux4life1.frontPorchAi
          # -> new com.linux4life1.frontPorchAi.nightly) macOS bundle relocation can't find
          # the new id, refuses to overwrite the different-id app already sitting at
          # /Applications/FrontPorchAI-Rawhide.app, and FORKS the install into
          # /Applications/FrontPorchAI-Rawhide.localized/ — so the user keeps launching the
          # OLD build and the update appears to do nothing. Disabling relocation makes the
          # install path deterministic (overwrites in place). This requires --root +
          # --component-plist (the --component shorthand can't set it), so stage just the
          # already-signed .app with ditto (preserves the Developer ID signature + the
          # framework Versions/Current symlinks), flip BundleIsRelocatable to false, build.
          # Verified locally: --component emits <relocate><bundle/></relocate> (forks);
          # this emits an empty <relocate/> in PackageInfo (deterministic overwrite).
          PKG_STAGE="$(mktemp -d)"
          ditto "$APP_NAME" "$PKG_STAGE/$APP_NAME"
          COMP_PLIST="${RUNNER_TEMP:-/tmp}/fp_component.plist"
          pkgbuild --analyze --root "$PKG_STAGE" "$COMP_PLIST"
          plutil -replace 0.BundleIsRelocatable -bool NO "$COMP_PLIST"
          echo "Building non-relocatable .pkg..."
          pkgbuild \
            --root "$PKG_STAGE" \
            --component-plist "$COMP_PLIST" \
            --install-location /Applications \
            "$UNSIGNED_PKG" || { echo "ERROR: pkgbuild failed"; exit 1; }
          rm -rf "$PKG_STAGE" "$COMP_PLIST"

          echo "Signing .pkg with Installer cert..."
          productsign --sign "$MACOS_INSTALLER_CERT_NAME" "$UNSIGNED_PKG" "$PKG_NAME" || { echo "ERROR: productsign failed"; exit 1; }
          rm -f "$UNSIGNED_PKG"
          echo "✓ PKG created successfully: $PKG_NAME"

      - name: Clean quarantine/FinderInfo from PKG file only (before notarization)
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          PKG_NAME="Front_Porch_AI_Nightly.pkg"
          if [[ "${{ github.workflow }}" == *"Release"* ]]; then
            VERSION="${{ github.event.release.tag_name || github.ref_name }}"
            PKG_NAME="Front_Porch_AI_${VERSION}.pkg"
          fi
          if [ -f "$PKG_NAME" ]; then
            echo "Light xattr cleanup on PKG file only (not recursive)"
            xattr -d com.apple.quarantine "$PKG_NAME" 2>/dev/null || true
            xattr -d com.apple.FinderInfo "$PKG_NAME" 2>/dev/null || true
          fi

      - name: Submit final PKG to notarization and Staple
        if: matrix.platform == 'macos'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd build/macos/Build/Products/Release
          PKG_NAME="Front_Porch_AI_Nightly.pkg"
          if [[ "${{ github.workflow }}" == *"Release"* ]]; then
            VERSION="${{ github.event.release.tag_name || github.ref_name }}"
            PKG_NAME="Front_Porch_AI_${VERSION}.pkg"
          fi
          
          echo "Submitting PKG for notarization..."
          SUBMIT_OUT=$(xcrun notarytool submit "$PKG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1) || true
          printf '%s\n' "$SUBMIT_OUT"

          # `notarytool submit --wait` exits 0 even when the status is Invalid, so
          # check the status explicitly. On anything other than Accepted, pull
          # Apple's notarization log (the specific per-file reasons) so a failure
          # is self-diagnosing in CI instead of a mystery "Invalid" + Error 65.
          SUBMISSION_ID=$(printf '%s\n' "$SUBMIT_OUT" | grep -Eo 'id: [0-9a-f-]{36}' | head -1 | awk '{print $2}')
          NOTARY_STATUS=$(printf '%s\n' "$SUBMIT_OUT" | grep -E '^[[:space:]]*status:' | tail -1 | awk '{print $2}')
          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            echo "::error::Notarization status='${NOTARY_STATUS:-unknown}' for $PKG_NAME (submission ${SUBMISSION_ID:-unknown})"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "── Apple notarization log ──"
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" 2>&1 || true
            fi
            exit 1
          fi
          
          echo "Stapling notarization ticket to PKG..."
          xcrun stapler staple "$PKG_NAME"
          xcrun stapler validate "$PKG_NAME" \
            && echo "✓ PKG staple verified" \
            || { echo "⚠ PKG staple validation failed"; exit 1; }
          
          # Move PKG to workspace root for upload-artifact step
          mv "$PKG_NAME" ../../../../../
          
          echo "✓ Build complete: PKG and inner .app are fully notarized and stapled!"

      # One last unsigned shim DMG (transitional). Produced from the exact same
      # .app bundle that went into the .pkg. Deliberately no codesign/notarize
      # so the legacy hdiutil attach path in UpdateService works on any macOS
      # (including old clients). Named exactly as the legacy consts so both old
      # and new client _platformAsset / fallback logic find it.
      - name: Build unsigned shim DMG (last bridge for in-app updater from .dmg/.app installs)
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          # Absolute via GITHUB_WORKSPACE (robust against relative path drift;
          # addresses review issue 9). Produces exact legacy name at root.
          SHIM_DMG="${GITHUB_WORKSPACE}/Front_Porch_AI_Nightly.dmg"
          echo "==> Building unsigned/un-notarized shim DMG $SHIM_DMG from $APP_NAME"
          # Stage so .app is at the volume root (client's find -maxdepth 1 expects it)
          SHIM_ROOT="/tmp/shim-$$"
          rm -rf "$SHIM_ROOT"
          mkdir -p "$SHIM_ROOT"
          cp -R "$APP_NAME" "$SHIM_ROOT/"
          # Direct minimal hdiutil — no create-dmg fanciness, no --codesign, no --notarize
          if hdiutil create -volname "Front Porch AI" -srcfolder "$SHIM_ROOT" -ov -format UDZO "$SHIM_DMG" 2>&1 | tail -5; then
            echo "✓ Shim DMG created"
          else
            echo "hdiutil failed for shim; trying create-dmg --skip-jenkins as fallback"
            brew install create-dmg || true
            "${GITHUB_WORKSPACE}/create-dmg.sh" --skip-jenkins "$SHIM_DMG" "$SHIM_ROOT" || true  # absolute for consistency (Issue B)
          fi
          rm -rf "$SHIM_ROOT"
          ls -l "$SHIM_DMG" || echo "(shim not present)"

      - name: Package Linux Nightly (AppImage + tar.gz)
        if: matrix.platform == 'linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Building Linux Nightly packages for $VERSION"

          # 1. Prepare AppDir for AppImage
          mkdir -p AppDir/usr/bin
          cp -r ${{ matrix.build_path }}/* AppDir/usr/bin/

          # Create Desktop file (Nightly branding)
          cat <<EOF > AppDir/front_porch_ai_nightly.desktop
          [Desktop Entry]
          Name=Front Porch AI Nightly
          Exec=front_porch_ai
          Icon=front_porch_ai
          Type=Application
          Categories=Utility;
          Comment=Rawhide Nightly - Bleeding edge build from rawhide branch
          EOF

          # Icon management
          if [ -f "assets/images/front_porch_ai_icon.png" ]; then
            cp assets/images/front_porch_ai_icon.png AppDir/front_porch_ai.png
            cp assets/images/front_porch_ai_icon.png AppDir/.DirIcon
          else
            touch AppDir/front_porch_ai.png
            touch AppDir/.DirIcon
          fi

          # AppRun - symlink to the binary in usr/bin
          ln -s usr/bin/front_porch_ai AppDir/AppRun

          # Create AppImage
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          ./appimagetool AppDir Front_Porch_AI_Nightly-Linux.AppImage

          # 2. Standard tar.gz (for users who prefer it)
          cd ${{ matrix.build_path }}
          tar -czvf ../../../../../Front_Porch_AI_Nightly-Linux.tar.gz .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: nightly-${{ matrix.platform }}
          path: |
            Front_Porch_AI_Nightly_Setup.exe
            Front_Porch_AI_Nightly.pkg
            Front_Porch_AI_Nightly.dmg
            Front_Porch_AI_Nightly-Linux.AppImage
            Front_Porch_AI_Nightly-Linux.tar.gz
          if-no-files-found: ignore

  publish-nightly:
    name: Publish Nightly Release
    needs: nightly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Rawhide (for release notes & version computation)
        uses: actions/checkout@v4
        with:
          ref: Rawhide

      - name: Compute Rawhide Nightly Version
        id: version
        shell: bash
        run: |
          DATE=$(date +%Y%m%d)
          SHA=$(git rev-parse --short HEAD)
          VERSION="rawhide.${DATE}.${SHA}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Setting nightly version to: $VERSION"

      - name: Prepare Friendly Release Notes (for in-app update dialog)
        id: release_notes
        shell: bash
        run: |
          NOTES_FILE="docs/Rawhide.md"

          if [ -f "$NOTES_FILE" ]; then
            BODY=$(awk '
              /^## / { 
                if (in_content) { exit } 
                in_content=1; 
                next 
              }
              in_content { print }
            ' "$NOTES_FILE")

            if [ -n "$BODY" ]; then
              echo "body<<EOF" >> $GITHUB_OUTPUT
              echo "$BODY" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              echo "Using notes from $NOTES_FILE"
            else
              echo 'body=**Rawhide Nightly** — Latest development from the Rawhide branch.' >> $GITHUB_OUTPUT
            fi
          else
            echo "No $NOTES_FILE found — using fallback notes"
            echo 'body=**Rawhide Nightly** — Bleeding-edge development. See the README for current focus areas.' >> $GITHUB_OUTPUT
          fi

      - name: Download Build Artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: nightly-*
          merge-multiple: true

      - name: Upload Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "nightly-${{ steps.version.outputs.VERSION }}"
          name: "Nightly ${{ steps.version.outputs.VERSION }}"
          prerelease: true
          generate_release_notes: false
          files: |
            Front_Porch_AI_Nightly_Setup.exe
            Front_Porch_AI_Nightly.pkg
            Front_Porch_AI_Nightly.dmg
            Front_Porch_AI_Nightly-Linux.AppImage
            Front_Porch_AI_Nightly-Linux.tar.gz
          body: |
            ${{ steps.release_notes.outputs.body }}

            ---
            **Rawhide Nightly Build** — `${{ steps.version.outputs.VERSION }}`

            Built from the `Rawhide` branch.
            This is the bleeding-edge version. Use at your own risk.

            Data directory: `FrontPorchAI-Beta`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update AUR beta package from Rawhide nightlies (reuse existing front-porch-ai-beta-bin) ──
  publish-aur-beta:
    name: Update AUR Beta Package (from Rawhide)
    needs: [nightly, publish-nightly]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Rawhide (for version computation)
        uses: actions/checkout@v4
        with:
          ref: Rawhide

      - name: Update AUR Beta Package from Nightly
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          # Recompute the exact Rawhide version for this build
          DATE=$(date +%Y%m%d)
          SHA=$(git rev-parse --short HEAD)
          VERSION="rawhide.${DATE}.${SHA}"
          TAG="nightly-${VERSION}"

          # AUR pkgver can contain dots
          AUR_VERSION="${VERSION}"

          # Set up SSH for AUR
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_key -o StrictHostKeyChecking=accept-new"

          # Clone the *existing* beta AUR repo so we don't have to create a new package
          git clone ssh://aur@aur.archlinux.org/front-porch-ai-beta-bin.git /tmp/aur
          cd /tmp/aur

          git config user.email "age3dude@gmail.com"
          git config user.name "Sosukeaizen"

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${AUR_VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^_tag=.*/_tag=\"${TAG}\"/" PKGBUILD

          # Generate .SRCINFO — keep the package name as beta-bin so we reuse the existing AUR page
          cat > .SRCINFO <<SRCINFO
          pkgbase = front-porch-ai-beta-bin
          	pkgdesc = A chilled out frontend for KoboldCPP (beta/pre-release + Rawhide nightlies)
          	pkgver = ${AUR_VERSION}
          	pkgrel = 1
          	url = https://github.com/linux4life1/front-porch-AI
          	arch = x86_64
          	license = GPL-3.0-or-later
          	depends = gtk3
          	depends = glib2
          	depends = libsecret
          	depends = fuse2
          	provides = front-porch-ai
          	conflicts = front-porch-ai
          	conflicts = front-porch-ai-bin
          	options = !strip
          	options = !debug
          	source = Front_Porch_AI_Nightly-Linux.AppImage::https://github.com/linux4life1/front-porch-AI/releases/download/${TAG}/Front_Porch_AI_Nightly-Linux.AppImage
          	source = front-porch-ai.desktop
          	source = front-porch-ai.png
          	sha256sums = SKIP
          	sha256sums = SKIP
          	sha256sums = SKIP

          pkgname = front-porch-ai-beta-bin
          SRCINFO

          # Remove leading whitespace from .SRCINFO (heredoc indentation)
          sed -i 's/^          //' .SRCINFO

          git add -A
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to ${TAG} (Rawhide nightly)"
          git push

          # Clean up
          rm -f ~/.ssh/aur_key
          echo "✓ AUR beta package updated to ${TAG} (Rawhide)"
