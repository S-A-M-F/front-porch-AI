name: Pre-Release (Installer + Standalone)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - '*alpha*'
      - '*Alpha*'
      - '*beta*'
      - '*Beta*'
      - '*rc*'
      - '*RC*'
      - '*dev*'
      - '*Dev*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Pre-Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build_path: build/windows/x64/runner/Release
          - os: macos-latest
            platform: macos
            build_path: build/macos/Build/Products/Release
          - os: ubuntu-22.04
            platform: linux
            asset_name: Front_Porch_AI_Linux.tar.gz
            build_path: build/linux/x64/release/bundle

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev libsecret-1-dev libwebkit2gtk-4.1-dev ninja-build pkg-config cmake libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Sync Version from Tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION=$(echo "$TAG" | sed 's/^[vV]//')
          # Convert 4-part (0.0.4.1) to Flutter format (0.0.4+1)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.([0-9]+)$ ]]; then
            FLUTTER_VERSION="$(echo $VERSION | sed 's/\.\([^.]*\)$/+\1/')"
          else
            FLUTTER_VERSION="${VERSION}+0"
          fi
          echo "Setting version to: $FLUTTER_VERSION"
          # Use the full version (including 4th part if present) for the Dart display constant
          DISPLAY_VERSION="$VERSION"
          # Use Python for cross-platform reliability (sed can fail silently with Windows \r\n line endings)
          python3 -c "
          import re
          # Update pubspec.yaml
          with open('pubspec.yaml', 'r') as f: content = f.read()
          content = re.sub(r'^version: .*$', 'version: $FLUTTER_VERSION', content, flags=re.MULTILINE)
          with open('pubspec.yaml', 'w') as f: f.write(content)
          # Patch only the appVersion constant (preserve all committed getters and comments).
          # This eliminates duplication and prevents compile breaks when app_version.dart evolves.
          with open('lib/app_version.dart', 'r') as f: content = f.read()
          content = re.sub(r\"^const String appVersion = '.*';\$\", "const String appVersion = '$DISPLAY_VERSION';", content, flags=re.MULTILINE)
          with open('lib/app_version.dart', 'w') as f: f.write(content)
          "
          # Verify both were updated (visible in CI logs)
          echo "Verifying pubspec version:"
          grep '^version:' pubspec.yaml
          echo "Verifying Dart version constant:"
          cat lib/app_version.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Disable inappwebview Linux plugin (uses external browser fallback)
        if: matrix.platform == 'linux'
        run: |
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  flutter_inappwebview_linux:" >> pubspec.yaml
          echo "    path: ci/flutter_inappwebview_linux_stub" >> pubspec.yaml
          flutter pub get

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python (with pip cache)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache ML Engines (Kokoro TTS, Piper TTS, Whisper STT, etc.)
        id: ml-cache
        uses: actions/cache@v4
        with:
          path: |
            ml-engines-cache
          key: ml-engines-${{ matrix.platform }}-${{ hashFiles('kokoro_tts.py', 'piper_entry.py', 'whisper_stt.py', 'sentiment_classifier.py', 'tools/embed_server/Cargo.toml', 'tools/dt-grpc-python/**') }}
          restore-keys: |
            ml-engines-${{ matrix.platform }}-

      - name: Build Application
        run: flutter build ${{ matrix.platform }} --release

      - name: Bundle ML Engines (Kokoro TTS, Piper TTS, Whisper STT, ONNX Embeddings)
        shell: bash
        run: |
          CACHE_HIT="${{ steps.ml-cache.outputs.cache-hit }}"
          CACHE_DIR="ml-engines-cache/${{ matrix.platform }}"

          if [ "$CACHE_HIT" == "true" ] && [ -d "$CACHE_DIR" ]; then
            echo "ML engines cache hit — skipping PyInstaller builds"
            mkdir -p "${{ matrix.build_path }}"
            cp -r "$CACHE_DIR/"* "${{ matrix.build_path }}/" || true
          else
            echo "ML engines cache miss — building from source"
            DEST="${{ matrix.build_path }}/piper"
            mkdir -p "$DEST"

            # Install TTS dependencies + PyInstaller
            pip install pyinstaller kokoro-onnx soundfile piper_tts pathvalidate faster-whisper numpy onnxruntime transformers huggingface_hub

          # Build Kokoro TTS as a standalone directory bundle
          echo "Building Kokoro TTS binary..."
          pyinstaller kokoro_tts.py \
            --onedir \
            --name kokoro_tts \
            --collect-all kokoro_onnx \
            --collect-all soundfile \
            --collect-all language_tags \
            --collect-all csvw \
            --collect-all segments \
            --collect-all phonemizer \
            --collect-all espeakng_loader \
            --hidden-import kokoro_onnx \
            --hidden-import soundfile \
            --hidden-import numpy \
            --hidden-import onnxruntime \
            --distpath "$DEST" \
            --workpath ./build_tmp/kokoro \
            --specpath ./build_tmp/kokoro \
            --clean \
            --exclude-module torch \
            --exclude-module torchvision \
            --exclude-module torchaudio \
            --noconfirm
          echo "Kokoro built at: $DEST/kokoro_tts/"

          # Build Piper TTS as a standalone directory bundle
          echo "Building Piper TTS binary..."
          pyinstaller piper_entry.py \
            --onedir \
            --name piper \
            --collect-all piper \
            --hidden-import piper \
            --hidden-import pathvalidate \
            --hidden-import piper_phonemize \
            --hidden-import onnxruntime \
            --distpath "$DEST" \
            --workpath ./build_tmp/piper \
            --specpath ./build_tmp/piper \
            --clean \
            --exclude-module torch \
            --exclude-module torchvision \
            --exclude-module torchaudio \
            --noconfirm
          echo "Piper built at: $DEST/piper/"

          # Build Whisper STT as a standalone directory bundle
          echo "Building Whisper STT binary..."
          STT_DEST="${{ matrix.build_path }}"
          pyinstaller whisper_stt.py \
            --onedir \
            --name whisper_stt \
            --collect-all faster_whisper \
            --hidden-import faster_whisper \
            --hidden-import ctranslate2 \
            --hidden-import huggingface_hub \
            --hidden-import tokenizers \
            --distpath "$STT_DEST" \
            --workpath ./build_tmp/whisper \
            --specpath ./build_tmp/whisper \
            --clean \
            --exclude-module torch \
            --exclude-module torchvision \
            --exclude-module torchaudio \
            --noconfirm
          echo "Whisper STT built at: $STT_DEST/whisper_stt/"

          # Build Embedding Server (Rust binary)
          echo "Building Embedding Server (Rust)..."
          cd tools/embed_server
          cargo build --release
          cd ../.. 
          EMBED_BINARY="tools/embed_server/target/release/embed_server"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            EMBED_BINARY="tools/embed_server/target/release/embed_server.exe"
          fi
          mkdir -p "$STT_DEST/embed_server"
          cp "$EMBED_BINARY" "$STT_DEST/embed_server/"
          echo "Embedding server built at: $STT_DEST/embed_server/"

          # Build Sentiment Classifier (expression images ONNX)
          echo "Building Sentiment Classifier binary..."
          pyinstaller sentiment_classifier.py \
            --onedir \
            --name sentiment_classifier \
            --collect-all huggingface_hub \
            --collect-all transformers \
            --collect-all numpy \
            --collect-all onnxruntime \
            --hidden-import huggingface_hub \
            --hidden-import transformers \
            --hidden-import numpy \
            --hidden-import onnxruntime \
            --distpath "$STT_DEST" \
            --workpath ./build_tmp/sentiment \
            --specpath ./build_tmp/sentiment \
            --clean \
            --exclude-module torch \
            --exclude-module torchvision \
            --exclude-module torchaudio \
            --noconfirm
          echo "Sentiment classifier built at: $STT_DEST/sentiment_classifier/"
          # Copy Draw Things gRPC Client (macOS only)
          if [ "${{ matrix.platform }}" = "macos" ]; then
            mkdir -p "$STT_DEST/dt-grpc-python"
            cp -R "tools/dt-grpc-python/"* "$STT_DEST/dt-grpc-python/"
            echo "Draw Things client copied to: $STT_DEST/dt-grpc-python/"
          fi

          # For macOS, copy into the app bundle Resources
          if [ "${{ matrix.platform }}" = "macos" ]; then
            APP_NAME=$(ls -d ${{ matrix.build_path }}/*.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              RESOURCES="$APP_NAME/Contents/Resources/piper"
              mkdir -p "$RESOURCES"
              cp -R "$DEST/kokoro_tts" "$RESOURCES/kokoro_tts"
              cp -R "$DEST/piper" "$RESOURCES/piper"
              chmod +x "$RESOURCES/kokoro_tts/kokoro_tts"
              chmod +x "$RESOURCES/piper/piper"

              STT_RESOURCES="$APP_NAME/Contents/Resources/whisper_stt"
              mkdir -p "$STT_RESOURCES"
              cp -R "$STT_DEST/whisper_stt/"* "$STT_RESOURCES/"
              chmod +x "$STT_RESOURCES/whisper_stt"

              EMBED_RESOURCES="$APP_NAME/Contents/Resources/embed_server"
              mkdir -p "$EMBED_RESOURCES"
              cp -R "$STT_DEST/embed_server/"* "$EMBED_RESOURCES/"
              chmod +x "$EMBED_RESOURCES/embed_server"

              SENTIMENT_RESOURCES="$APP_NAME/Contents/Resources/sentiment_classifier"
              mkdir -p "$SENTIMENT_RESOURCES"
              cp -R "$STT_DEST/sentiment_classifier/"* "$SENTIMENT_RESOURCES/"
              chmod +x "$SENTIMENT_RESOURCES/sentiment_classifier"

              DT_RESOURCES="$APP_NAME/Contents/Resources/dt-grpc-python"
              mkdir -p "$DT_RESOURCES"
              cp -R "$STT_DEST/dt-grpc-python/"* "$DT_RESOURCES/"
            fi
          fi

          echo "TTS engines bundled at: $DEST"
          ls -la "$DEST"
          echo "STT engine bundled at: $STT_DEST/whisper_stt/"
          ls -la "$STT_DEST/whisper_stt/"
          echo "Embedding server bundled at: $STT_DEST/embed_server/"
          ls -la "$STT_DEST/embed_server/"

      - name: Re-sign macOS App (ad-hoc with entitlements)
        if: matrix.platform == 'macos'
        run: |
          APP_NAME=$(ls -d ${{ matrix.build_path }}/*.app | head -1)
          ENTITLEMENTS="${{ github.workspace }}/macos/Runner/Release.entitlements"
          echo "Re-signing $APP_NAME after ML engine bundling..."
          echo "Using entitlements: $ENTITLEMENTS"
          # Sign inner frameworks/helpers first (inside-out signing)
          find "$APP_NAME/Contents/Frameworks" -name "*.framework" -o -name "*.dylib" | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          find "$APP_NAME/Contents/Resources" -type f -perm +111 | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          # Sign the main app with entitlements (preserves file picker, network, etc.)
          codesign --force --sign - --entitlements "$ENTITLEMENTS" "$APP_NAME"
          echo "✓ Ad-hoc signature applied with entitlements"

      - name: Download VC++ Redistributable
        if: matrix.platform == 'windows'
        run: |
          $DestDir = "${{ github.workspace }}\${{ matrix.build_path }}\.."
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "$DestDir\vc_redist.x64.exe"
          Write-Host "VC++ Redistributable downloaded to $DestDir"
        shell: pwsh

      - name: Build Windows Installer (Inno Setup)
        if: matrix.platform == 'windows'
        run: |
          $VERSION = "${env:GITHUB_REF_NAME}" -replace '^[vV]', ''
          choco install innosetup -y --no-progress
          $ISCC = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $ISCC /DPRE_RELEASE=1 /DMyAppVersion="$VERSION" /DMyAppBuildDir="${{ github.workspace }}\${{ matrix.build_path }}" /DMyAppLicenseFile="${{ github.workspace }}\LICENSE" /DMyAppIconFile="${{ github.workspace }}\windows\runner\resources\app_icon.ico" "installers\windows\setup.iss"
          Copy-Item "installers\windows\Front_Porch_AI_Beta_Setup.exe" -Destination "."
        shell: pwsh



      - name: Clean xattrs from app bundle (required before packaging)
        if: matrix.platform == 'macos'
        run: |
          APP_PATH="build/macos/Build/Products/Release/FrontPorchAI.app"
          xattr -cr "$APP_PATH" || true
          find "$APP_PATH" -exec xattr -d com.apple.FinderInfo {} + 2>/dev/null || true

      # Primary artifact for beta channel is now .pkg (to match the updater consts
      # and the overall .pkg direction). Beta flow currently does ad-hoc app re-sign
      # (no full Developer ID + notary secrets in this workflow), so we do a bare
      # pkgbuild here. The important thing for the auto-updater transition is the
      # fixed name + the unsigned shim DMG.
      - name: Build macOS PKG (primary for beta channel)
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          PKG_NAME="Front_Porch_AI_MacOS.pkg"
          UNSIGNED_PKG="unsigned_${PKG_NAME}"
          echo "Building (bare) .pkg for beta channel: $PKG_NAME from $APP_NAME"
          pkgbuild \
            --component "$APP_NAME" \
            --install-location /Applications \
            "$UNSIGNED_PKG" || { echo "ERROR: pkgbuild failed"; exit 1; }
          # No productsign here (beta flow lacks the full installer cert import/notary path
          # that nightly/release have). The .pkg is still the canonical name the updater
          # will look for; real signed+stapled .pkgs come from the other channels.
          mv "$UNSIGNED_PKG" "$PKG_NAME"
          echo "✓ PKG created: $PKG_NAME (beta channel)"
          # Promote the *canonical* PKG name (what _platformAsset + fallback will
          # request for the beta/pre-release channel) to workspace root so that
          # upload-artifact + gh-release publish it under the exact name the
          # in-app updater expects. Use ${GITHUB_WORKSPACE} (absolute) to avoid
          # brittle relative ../../ counts (addresses review issues 1 and 9).
          mv "$PKG_NAME" "${GITHUB_WORKSPACE}/Front_Porch_AI_MacOS.pkg" 2>/dev/null || true

      # Unsigned shim DMG (the "one last" bridge). Same .app, legacy name, no sign.
      # This + the PKG above lets beta-channel users (old and new) keep auto-updating
      # from within the app.
      - name: Build unsigned shim DMG (legacy name for beta updater transition)
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          # Write directly to GITHUB_WORKSPACE using absolute path (robust, no
          # relative ../../ count that can drift; see review issue 9). This
          # ensures the exact legacy name appears at root for artifact/gh-release.
          SHIM_DMG="${GITHUB_WORKSPACE}/Front_Porch_AI_MacOS.dmg"
          echo "==> Building unsigned shim DMG $SHIM_DMG (no codesign/notarize)"
          SHIM_ROOT="/tmp/shim-beta-$$"
          rm -rf "$SHIM_ROOT"
          mkdir -p "$SHIM_ROOT"
          cp -R "$APP_NAME" "$SHIM_ROOT/"
          if hdiutil create -volname "Front Porch AI" -srcfolder "$SHIM_ROOT" -ov -format UDZO "$SHIM_DMG" 2>&1 | tail -3; then
            echo "✓ beta shim DMG via hdiutil"
          else
            echo "hdiutil shim failed; create-dmg --skip-jenkins fallback"
            brew install create-dmg || true
            "${GITHUB_WORKSPACE}/create-dmg.sh" --skip-jenkins "$SHIM_DMG" "$SHIM_ROOT" || true  # absolute for consistency (Issue B)
          fi
          rm -rf "$SHIM_ROOT"
          ls -l "$SHIM_DMG" || true

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(echo ${GITHUB_REF_NAME} | sed 's/^[vV]//')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Package Linux (AppImage + tar.gz only)
        if: matrix.platform == 'linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building beta packages for version $VERSION"
          
          # 1. Prepare AppImage
          mkdir -p AppDir/usr/bin
          cp -r ${{ matrix.build_path }}/* AppDir/usr/bin/
          
          # Create Desktop file
          cat <<EOF > AppDir/front_porch_ai.desktop
          [Desktop Entry]
          Name=Front Porch AI
          Exec=front_porch_ai
          Icon=front_porch_ai
          Type=Application
          Categories=Utility;
          Comment=A chilled out frontend for KoboldCPP
          EOF
          
          # Icon management
          if [ -f "assets/images/front_porch_ai_icon.png" ]; then
            cp assets/images/front_porch_ai_icon.png AppDir/front_porch_ai.png
            cp assets/images/front_porch_ai_icon.png AppDir/.DirIcon
          else
            touch AppDir/front_porch_ai.png
            touch AppDir/.DirIcon
          fi
          
          # AppRun - symlink to the binary in usr/bin
          ln -s usr/bin/front_porch_ai AppDir/AppRun
          
          # Create AppImage
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          ./appimagetool AppDir Front_Porch_AI-Linux.AppImage
          
          # 2. Standard tar.gz (no deb, no rpm)
          cd ${{ matrix.build_path }}
          tar -czvf ../../../../../${{ matrix.asset_name }} .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-${{ matrix.platform }}
          path: |
            Front_Porch_AI_Beta_Setup.exe
            Front_Porch_AI_MacOS.pkg
            Front_Porch_AI_MacOS.dmg
            Front_Porch_AI-Linux.AppImage
          if-no-files-found: ignore

      - name: Prepare Friendly Release Notes
        id: release_notes
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"

          # Try to find a matching per-branch notes file
          if [[ "$TAG" == *"Beta"* ]] || [[ "$TAG" == *"beta"* ]]; then
            NOTES_FILE="docs/0.9.8-Beta.md"
          elif [[ "$TAG" == *"Rawhide"* ]] || [[ "$TAG" == *"nightly"* ]]; then
            NOTES_FILE="docs/Rawhide.md"
          else
            NOTES_FILE="docs/main.md"
          fi

          if [ -f "$NOTES_FILE" ]; then
            BODY=$(awk '
              /^## / { if (in_content) { exit }; in_content=1; next }
              in_content { print }
            ' "$NOTES_FILE" || true)

            if [ -n "$BODY" ]; then
              echo "body<<EOF" >> $GITHUB_OUTPUT
              echo "$BODY" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              echo "Using notes from $NOTES_FILE for tag $TAG"
            else
              echo "body=" >> $GITHUB_OUTPUT
            fi
          else
            echo "No notes file found at $NOTES_FILE — release body will be empty"
            echo "body=" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Front_Porch_AI_Beta_Setup.exe
            Front_Porch_AI_MacOS.pkg
            Front_Porch_AI_MacOS.dmg
            Front_Porch_AI-Linux.AppImage
          prerelease: true
          name: "${{ github.ref_name }} (Pre-Release)"
          body: ${{ steps.release_notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update AUR beta package (front-porch-ai-beta-bin) ──
  publish-aur-beta:
    name: Update AUR Beta Package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update AUR Beta Package
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # AUR pkgver can't contain hyphens, replace with underscore
          VERSION=$(echo "$TAG" | sed 's/^[vV]//; s/-/_/g')

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_key -o StrictHostKeyChecking=accept-new"

          # Clone AUR repo
          git clone ssh://aur@aur.archlinux.org/front-porch-ai-beta-bin.git /tmp/aur
          cd /tmp/aur

          git config user.email "age3dude@gmail.com"
          git config user.name "Sosukeaizen"

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^_tag=.*/_tag=\"${TAG}\"/" PKGBUILD

          # Generate .SRCINFO
          cat > .SRCINFO <<SRCINFO
          pkgbase = front-porch-ai-beta-bin
          	pkgdesc = A chilled out frontend for KoboldCPP (beta/pre-release)
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/linux4life1/front-porch-AI
          	arch = x86_64
          	license = GPL-3.0-or-later
          	depends = gtk3
          	depends = glib2
          	depends = libsecret
          	depends = fuse2
          	provides = front-porch-ai
          	conflicts = front-porch-ai
          	conflicts = front-porch-ai-bin
          	options = !strip
          	options = !debug
          	source = Front_Porch_AI-Linux.AppImage::https://github.com/linux4life1/front-porch-AI/releases/download/${TAG}/Front_Porch_AI-Linux.AppImage
          	source = front-porch-ai.desktop
          	source = front-porch-ai.png
          	sha256sums = SKIP
          	sha256sums = SKIP
          	sha256sums = SKIP

          pkgname = front-porch-ai-beta-bin
          SRCINFO

          # Remove leading whitespace from .SRCINFO
          sed -i 's/^          //' .SRCINFO

          git add -A
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to ${TAG}"
          git push

          # Clean up
          rm -f ~/.ssh/aur_key
          echo "✓ AUR beta package updated to ${TAG}"
