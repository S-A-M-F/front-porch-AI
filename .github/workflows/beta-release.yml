name: Pre-Release (Standalone Only)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - '*alpha*'
      - '*Alpha*'
      - '*beta*'
      - '*Beta*'
      - '*rc*'
      - '*RC*'
      - '*dev*'
      - '*Dev*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Pre-Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            asset_name: Front_Porch_AI_Windows.zip
            build_path: build/windows/x64/runner/Release
          - os: macos-latest
            platform: macos
            asset_name: Front_Porch_AI_MacOS.zip
            build_path: build/macos/Build/Products/Release
          - os: ubuntu-22.04
            platform: linux
            asset_name: Front_Porch_AI_Linux.tar.gz
            build_path: build/linux/x64/release/bundle

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev libsecret-1-dev libwebkit2gtk-4.1-dev ninja-build pkg-config cmake libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Sync Version from Tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION=$(echo "$TAG" | sed 's/^[vV]//')
          # Convert 4-part (0.0.4.1) to Flutter format (0.0.4+1)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.([0-9]+)$ ]]; then
            FLUTTER_VERSION="$(echo $VERSION | sed 's/\.\([^.]*\)$/+\1/')"
          else
            FLUTTER_VERSION="${VERSION}+0"
          fi
          echo "Setting version to: $FLUTTER_VERSION"
          # Use the full version (including 4th part if present) for the Dart display constant
          DISPLAY_VERSION="$VERSION"
          # Use Python for cross-platform reliability (sed can fail silently with Windows \r\n line endings)
          python3 -c "
          import re
          # Update pubspec.yaml
          with open('pubspec.yaml', 'r') as f: content = f.read()
          content = re.sub(r'^version: .*$', 'version: $FLUTTER_VERSION', content, flags=re.MULTILINE)
          with open('pubspec.yaml', 'w') as f: f.write(content)
          # Update Dart version constant
          with open('lib/app_version.dart', 'w') as f:
              f.write(\"/// Single source of truth for the app version.\n\")
              f.write(\"/// Update this constant whenever a new release is made.\n\")
              f.write(\"/// This avoids reliance on platform-specific version resource extraction\n\")
              f.write(\"/// (e.g., PackageInfo.fromPlatform) which can be unreliable on Windows.\n\")
              f.write(\"const String appVersion = '$DISPLAY_VERSION';\n\n\")
              f.write(\"/// Whether the current build is a pre-release (alpha, beta, rc, dev).\n\")
              f.write(\"bool get isPreRelease {\n\")
              f.write(\"  final lower = appVersion.toLowerCase();\n\")
              f.write(\"  return lower.contains('-alpha') ||\n\")
              f.write(\"      lower.contains('-beta') ||\n\")
              f.write(\"      lower.contains('-rc') ||\n\")
              f.write(\"      lower.contains('-dev');\n\")
              f.write(\"}\n\n\")
              f.write(\"/// The stable version number without the pre-release suffix.\n\")
              f.write(\"String get stableVersionBase => appVersion.split('-').first;\n\")
          "
          # Verify both were updated (visible in CI logs)
          echo "Verifying pubspec version:"
          grep '^version:' pubspec.yaml
          echo "Verifying Dart version constant:"
          cat lib/app_version.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Disable inappwebview Linux plugin (uses external browser fallback)
        if: matrix.platform == 'linux'
        run: |
          echo "" >> pubspec.yaml
          echo "dependency_overrides:" >> pubspec.yaml
          echo "  flutter_inappwebview_linux:" >> pubspec.yaml
          echo "    path: ci/flutter_inappwebview_linux_stub" >> pubspec.yaml
          flutter pub get

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Application
        run: flutter build ${{ matrix.platform }} --release

      - name: Bundle ML Engines (Kokoro TTS, Piper TTS, Whisper STT, ONNX Embeddings)
        shell: bash
        run: |
          DEST="${{ matrix.build_path }}/piper"
          mkdir -p "$DEST"

          # Install TTS dependencies + PyInstaller
          pip install --upgrade pip
          pip install pyinstaller kokoro-onnx soundfile piper_tts pathvalidate faster-whisper

          # Build Kokoro TTS as a standalone directory bundle
          echo "Building Kokoro TTS binary..."
          pyinstaller kokoro_tts.py \
            --onedir \
            --name kokoro_tts \
            --collect-all kokoro_onnx \
            --collect-all soundfile \
            --collect-all language_tags \
            --collect-all csvw \
            --collect-all segments \
            --collect-all phonemizer \
            --collect-all espeakng_loader \
            --hidden-import kokoro_onnx \
            --hidden-import soundfile \
            --hidden-import numpy \
            --hidden-import onnxruntime \
            --distpath "$DEST" \
            --workpath ./build_tmp/kokoro \
            --specpath ./build_tmp/kokoro \
            --clean \
            --noconfirm
          echo "Kokoro built at: $DEST/kokoro_tts/"

          # Build Piper TTS as a standalone directory bundle
          echo "Building Piper TTS binary..."
          pyinstaller piper_entry.py \
            --onedir \
            --name piper \
            --collect-all piper \
            --hidden-import piper \
            --hidden-import pathvalidate \
            --hidden-import piper_phonemize \
            --hidden-import onnxruntime \
            --distpath "$DEST" \
            --workpath ./build_tmp/piper \
            --specpath ./build_tmp/piper \
            --clean \
            --noconfirm
          echo "Piper built at: $DEST/piper/"

          # Build Whisper STT as a standalone directory bundle
          echo "Building Whisper STT binary..."
          STT_DEST="${{ matrix.build_path }}"
          pyinstaller whisper_stt.py \
            --onedir \
            --name whisper_stt \
            --collect-all faster_whisper \
            --hidden-import faster_whisper \
            --hidden-import ctranslate2 \
            --hidden-import huggingface_hub \
            --hidden-import tokenizers \
            --distpath "$STT_DEST" \
            --workpath ./build_tmp/whisper \
            --specpath ./build_tmp/whisper \
            --clean \
            --noconfirm
          echo "Whisper STT built at: $STT_DEST/whisper_stt/"

          # Build Embedding Server (Rust binary)
          echo "Building Embedding Server (Rust)..."
          cd tools/embed_server
          cargo build --release
          cd ../.. 
          EMBED_BINARY="tools/embed_server/target/release/embed_server"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            EMBED_BINARY="tools/embed_server/target/release/embed_server.exe"
          fi
          mkdir -p "$STT_DEST/embed_server"
          cp "$EMBED_BINARY" "$STT_DEST/embed_server/"
          echo "Embedding server built at: $STT_DEST/embed_server/"

          # For macOS, copy into the app bundle Resources
          if [ "${{ matrix.platform }}" = "macos" ]; then
            APP_NAME=$(ls -d ${{ matrix.build_path }}/*.app 2>/dev/null | head -1)
            if [ -n "$APP_NAME" ]; then
              RESOURCES="$APP_NAME/Contents/Resources/piper"
              mkdir -p "$RESOURCES"
              cp -R "$DEST/kokoro_tts" "$RESOURCES/kokoro_tts"
              cp -R "$DEST/piper" "$RESOURCES/piper"
              chmod +x "$RESOURCES/kokoro_tts/kokoro_tts"
              chmod +x "$RESOURCES/piper/piper"

              STT_RESOURCES="$APP_NAME/Contents/Resources/whisper_stt"
              mkdir -p "$STT_RESOURCES"
              cp -R "$STT_DEST/whisper_stt/"* "$STT_RESOURCES/"
              chmod +x "$STT_RESOURCES/whisper_stt"

              EMBED_RESOURCES="$APP_NAME/Contents/Resources/embed_server"
              mkdir -p "$EMBED_RESOURCES"
              cp -R "$STT_DEST/embed_server/"* "$EMBED_RESOURCES/"
              chmod +x "$EMBED_RESOURCES/embed_server"
            fi
          fi

          echo "TTS engines bundled at: $DEST"
          ls -la "$DEST"
          echo "STT engine bundled at: $STT_DEST/whisper_stt/"
          ls -la "$STT_DEST/whisper_stt/"
          echo "Embedding server bundled at: $STT_DEST/embed_server/"
          ls -la "$STT_DEST/embed_server/"

      - name: Re-sign macOS App (ad-hoc with entitlements)
        if: matrix.platform == 'macos'
        run: |
          APP_NAME=$(ls -d ${{ matrix.build_path }}/*.app | head -1)
          ENTITLEMENTS="${{ github.workspace }}/macos/Runner/Release.entitlements"
          echo "Re-signing $APP_NAME after ML engine bundling..."
          echo "Using entitlements: $ENTITLEMENTS"
          # Sign inner frameworks/helpers first (inside-out signing)
          find "$APP_NAME/Contents/Frameworks" -name "*.framework" -o -name "*.dylib" | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          find "$APP_NAME/Contents/Resources" -type f -perm +111 | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          # Sign the main app with entitlements (preserves file picker, network, etc.)
          codesign --force --sign - --entitlements "$ENTITLEMENTS" "$APP_NAME"
          echo "✓ Ad-hoc signature applied with entitlements"

      # ── Standalone packaging only — no installers, no DMG, no deb/rpm ──

      - name: Package Windows (zip)
        if: matrix.platform == 'windows'
        run: |
          cd ${{ matrix.build_path }}
          Compress-Archive -Path * -DestinationPath ../../../../../${{ matrix.asset_name }}
        shell: pwsh

      - name: Package MacOS (zip)
        if: matrix.platform == 'macos'
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -1)
          echo "Found app bundle: $APP_NAME"
          zip -r ../../../../../${{ matrix.asset_name }} "$APP_NAME"

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(echo ${GITHUB_REF_NAME} | sed 's/^[vV]//')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Package Linux (AppImage + tar.gz only)
        if: matrix.platform == 'linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building beta packages for version $VERSION"
          
          # 1. Prepare AppImage
          mkdir -p AppDir/usr/bin
          cp -r ${{ matrix.build_path }}/* AppDir/usr/bin/
          
          # Create Desktop file
          cat <<EOF > AppDir/front_porch_ai.desktop
          [Desktop Entry]
          Name=Front Porch AI
          Exec=front_porch_ai
          Icon=front_porch_ai
          Type=Application
          Categories=Utility;
          Comment=A chilled out frontend for KoboldCPP
          EOF
          
          # Icon management
          if [ -f "assets/images/front_porch_ai_icon.png" ]; then
            cp assets/images/front_porch_ai_icon.png AppDir/front_porch_ai.png
            cp assets/images/front_porch_ai_icon.png AppDir/.DirIcon
          else
            touch AppDir/front_porch_ai.png
            touch AppDir/.DirIcon
          fi
          
          # AppRun - symlink to the binary in usr/bin
          ln -s usr/bin/front_porch_ai AppDir/AppRun
          
          # Create AppImage
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          ./appimagetool AppDir Front_Porch_AI-Linux.AppImage
          
          # 2. Standard tar.gz (no deb, no rpm)
          cd ${{ matrix.build_path }}
          tar -czvf ../../../../../${{ matrix.asset_name }} .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: build-${{ matrix.platform }}
          path: |
            ${{ matrix.asset_name }}
            Front_Porch_AI-Linux.AppImage
          if-no-files-found: ignore

      - name: Create or Update Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset_name }}
            Front_Porch_AI-Linux.AppImage
          generate_release_notes: true
          prerelease: true
          name: "${{ github.ref_name }} (Pre-Release)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Update AUR beta package (front-porch-ai-beta-bin) ──
  publish-aur-beta:
    name: Update AUR Beta Package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update AUR Beta Package
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # AUR pkgver can't contain hyphens, replace with underscore
          VERSION=$(echo "$TAG" | sed 's/^[vV]//; s/-/_/g')

          # Set up SSH
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_key -o StrictHostKeyChecking=accept-new"

          # Clone AUR repo
          git clone ssh://aur@aur.archlinux.org/front-porch-ai-beta-bin.git /tmp/aur
          cd /tmp/aur

          git config user.email "age3dude@gmail.com"
          git config user.name "Sosukeaizen"

          # Update PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^_tag=.*/_tag=\"${TAG}\"/" PKGBUILD

          # Generate .SRCINFO
          cat > .SRCINFO <<SRCINFO
          pkgbase = front-porch-ai-beta-bin
          	pkgdesc = A chilled out frontend for KoboldCPP (beta/pre-release)
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/linux4life1/front-porch-AI
          	arch = x86_64
          	license = GPL-3.0-or-later
          	depends = gtk3
          	depends = glib2
          	depends = libsecret
          	depends = fuse2
          	provides = front-porch-ai
          	conflicts = front-porch-ai
          	conflicts = front-porch-ai-bin
          	options = !strip
          	options = !debug
          	source = Front_Porch_AI-Linux.AppImage::https://github.com/linux4life1/front-porch-AI/releases/download/${TAG}/Front_Porch_AI-Linux.AppImage
          	source = front-porch-ai.desktop
          	source = front-porch-ai.png
          	sha256sums = SKIP
          	sha256sums = SKIP
          	sha256sums = SKIP

          pkgname = front-porch-ai-beta-bin
          SRCINFO

          # Remove leading whitespace from .SRCINFO
          sed -i 's/^          //' .SRCINFO

          git add -A
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to ${TAG}"
          git push

          # Clean up
          rm -f ~/.ssh/aur_key
          echo "✓ AUR beta package updated to ${TAG}"
