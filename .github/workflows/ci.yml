name: CI

on:
  push:
    branches: [dev, main, Rawhide]
  pull_request:
    branches: [dev, main, Rawhide]
  schedule:
    # Run full project lint every Monday at 09:00 UTC
    - cron: '0 9 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: CI (changed Dart files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # needed for git diff against base branch

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter Analyze on changed Dart files only
        run: |
          # Get list of changed Dart files, compared against the *current state of the
          # target branch itself* (Rawhide for Rawhide work, dev for dev work, etc.).
          #
          # The old logic had a hard-coded `|| 'dev'` fallback that made the entire
          # "changed files only" gate garbage for Rawhide (the primary development
          # branch). Rawhide pushes must diff against origin/Rawhide, not dev.
          #
          # - pull_request: github.base_ref is the target (e.g. Rawhide)
          # - push: github.ref_name is the branch being pushed to (e.g. Rawhide)
          BASE_BRANCH="${{ github.base_ref || github.ref_name || 'Rawhide' }}"
          CHANGED_DART=$(git diff --name-only --diff-filter=ACM "origin/$BASE_BRANCH...HEAD" -- '*.dart' || true)

          if [ -z "$CHANGED_DART" ]; then
            echo "No Dart files changed in this run — skipping analyze."
            exit 0
          fi

          echo "Dart files changed (relative to origin/$BASE_BRANCH):"
          echo "$CHANGED_DART"
          echo ""

          # Now that the codebase is clean (0 warnings), we can be stricter on new code.
          # New warnings introduced in a PR/push will now fail the job.
          flutter analyze --no-fatal-infos $CHANGED_DART

  full-lint:
    name: Full project lint (scheduled + main pushes)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Rawhide' || github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run full Flutter Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos || true

  test:
    name: Tests (unit + integration)
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Python (for sidecars used by expression classifier / ONNX tests etc.)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps for test sidecars (matching build workflows to avoid classifier/ONNX crashes)
        run: pip install numpy onnxruntime huggingface_hub transformers faster-whisper kokoro-onnx soundfile piper_tts pathvalidate

      - name: Run Tests
        # Use --concurrency=1 because several tests (notably the "real production"
        # ChatService + GroupTurnManager + per-speaker realism evals + DB settles
        # in chat_service_realism_engine_test.dart) are integration-style and
        # timing-sensitive. Default high concurrency on GitHub runners causes
        # intermittent races in async group member population, isEvaluatingRealism
        # polling, and shared mock setup (path_provider, SharedPreferences,
        # forTesting DBs) even with the internal while-loop settles.
        # See test file comments on "robust settle", "under load/CI", and the
        # card-seed / inter-char key handling.
        # Pixel golden tests run in the dedicated `golden` job below so a render
        # diff never masks a logic failure here and vice-versa.
        run: flutter test --concurrency=1 --reporter expanded --exclude-tags golden
        timeout-minutes: 20

  golden:
    name: Widget Golden Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Widget Golden Tests
        # Pixel goldens are authored against this ubuntu image and must match
        # exactly. Any UI change that shifts a pixel will fail this job.
        # To update goldens after an intentional UI change, run on Linux:
        #   flutter test --tags golden --update-goldens
        # then commit the refreshed PNGs alongside the UI change.
        #
        # This job runs in parallel with `test` (both need `analyze` to pass)
        # so a golden failure is always reported independently of logic failures.
        run: flutter test --concurrency=1 --reporter expanded --tags golden
        timeout-minutes: 10
