name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # Required to diff against the base branch

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter Analyze (changed files only)
        run: |
          # On direct pushes to dev/main, run full analyze
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Direct push detected — running full project analyze"
            flutter analyze --no-fatal-warnings --no-fatal-infos
            exit $?
          fi

          git fetch origin ${{ github.base_ref }}

          CHANGED_DART_FILES=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }}...HEAD -- '*.dart' | tr '\n' ' ')

          if [ -z "$CHANGED_DART_FILES" ]; then
            echo "No Dart files were changed in this PR. Skipping analyze."
            exit 0
          fi

          echo "Analyzing changed Dart files:"
          echo "$CHANGED_DART_FILES"
          flutter analyze $CHANGED_DART_FILES --no-fatal-warnings --no-fatal-infos

  test:
    name: CI
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test --reporter expanded
