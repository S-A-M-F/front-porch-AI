name: CI

on:
  push:
    branches: [dev, main, Rawhide]
  pull_request:
    branches: [dev, main, Rawhide]
  schedule:
    # Run full project lint every Monday at 09:00 UTC
    - cron: '0 9 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: CI (changed Dart files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # needed for git diff against base branch

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter Analyze on changed Dart files only
        run: |
          # Get list of changed Dart files in this PR/push
          CHANGED_DART=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref || 'dev' }}...HEAD -- '*.dart' || true)

          if [ -z "$CHANGED_DART" ]; then
            echo "No Dart files changed in this run — skipping analyze."
            exit 0
          fi

          echo "Dart files changed:"
          echo "$CHANGED_DART"
          echo ""

          # Now that the codebase is clean (0 warnings), we can be stricter on new code.
          # New warnings introduced in a PR will now fail the job.
          flutter analyze --no-fatal-infos $CHANGED_DART

  full-lint:
    name: Full project lint (scheduled + main pushes)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Rawhide' || github.ref == 'refs/heads/dev'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run full Flutter Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos || true

  test:
    name: CI
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test --reporter expanded
