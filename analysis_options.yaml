# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  # Exclude generated code from lint analysis. These files are produced by
  # protobuf / FlatBuffers / gRPC tooling (draw_things.fbs, image_service.proto, etc.)
  # and frequently trigger spurious warnings (e.g. override_on_non_overriding_member)
  # that cannot be fixed without regenerating or hand-editing the outputs.
  exclude:
    - "**/*.g.dart"
    - "**/*_generated.dart"
    - "lib/services/grpc/**.pb*.dart"
    - "lib/services/grpc/draw_things_generated.dart"

linter:
  rules:
    # Suppress noisy info-level lints that don't add value for this codebase.
    # These are intentionally disabled; re-enabling any of them requires a
    # dedicated cleanup pass and team discussion (see Phase 4 of the lint debt plan).
    avoid_print: false
    use_build_context_synchronously: false
    # Note: curly_braces_in_flow_control_structures was successfully re-enabled and cleaned (Feb 2026)
    prefer_interpolation_to_compose_strings: false
    unnecessary_string_escapes: false
    prefer_final_fields: false
    unnecessary_this: false
    prefer_null_aware_operators: false
    non_constant_identifier_names: false
    no_leading_underscores_for_local_identifiers: false

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
