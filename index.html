<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Porch AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            color: #f5a623;
            margin-bottom: 0.3em;
        }

        .tagline {
            font-size: 1.2em;
            color: #aaa;
            margin-bottom: 2em;
        }

        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1em;
        }

        .links a {
            color: #82b1ff;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #333;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .links a:hover {
            background: #2a2a4e;
            border-color: #82b1ff;
        }

        .footer {
            margin-top: 3em;
            font-size: 0.85em;
            color: #666;
        }

        .footer a {
            color: #82b1ff;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🪑 Front Porch AI</h1>
        <p class="tagline">A chilled out frontend for KoboldCPP</p>
        <p>Free, open-source, cross-platform desktop app for managing AI character cards and chatting with local or
            cloud language models.</p>
        <div class="links">
            <a href="https://github.com/linux4life1/front-porch-AI">GitHub</a>
            <a href="https://github.com/linux4life1/front-porch-AI/releases">Downloads</a>
            <a href="https://discord.gg/EqJrJPjdT">Discord</a>
            <a href="https://matrix.dreamersai.art">Matrix</a>
        </div>
        <div class="footer">
            <a href="/privacy.html">Privacy Policy</a> · Licensed under <a
                href="https://github.com/linux4life1/front-porch-AI/blob/main/LICENSE">GPL v3</a>
        </div>
    </div>
</body>

</html>
